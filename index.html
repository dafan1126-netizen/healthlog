<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Daily Rep Counter</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eeeeec;
      --panel: #ffffff;
      --panel-soft: #f1f1ee;
      --ink: #111111;
      --muted: #757575;
      --line: #e7e5df;
      --accent: #fc4c02;
      --accent-2: #111111;
      --accent-3: #7c3aed;
      --accent-4: #2374ff;
      --gold: #f5b301;
      --good: #16a06d;
      --shadow: 0 26px 60px rgba(17, 17, 17, 0.12);
      --shadow-soft: 0 14px 34px rgba(17, 17, 17, 0.08);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    body::before {
      content: none;
      position: fixed;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(17, 17, 17, 0.03), transparent 30%, transparent 70%, rgba(17, 17, 17, 0.03));
      pointer-events: none;
      z-index: -1;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease, background 120ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    button:active {
      transform: scale(0.96);
      filter: brightness(0.96);
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
      padding: 30px 20px 112px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 0 8px 18px;
      min-height: 88px;
      margin-bottom: 8px;
      color: var(--ink);
      background: transparent;
      border-radius: var(--radius);
      box-shadow: none;
      overflow: visible;
      position: relative;
      border: 0;
    }

    .topbar::after {
      content: none;
    }

    .topbar::before {
      content: none;
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      display: none;
    }

    .brand p {
      margin: 0;
      color: var(--ink);
      font-size: clamp(25px, 4.6vw, 38px);
      line-height: 1.12;
      font-weight: 900;
      letter-spacing: 0;
      position: relative;
      z-index: 1;
    }

    .date-line {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding: 0;
      border: 0;
      border-radius: var(--radius);
      background: transparent;
      color: #343840;
      font-size: 14px;
      font-weight: 800;
      box-shadow: none;
      position: relative;
      z-index: 1;
    }

    .score-line {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      min-height: 34px;
      padding: 0 13px;
      border-radius: 999px;
      background: #fff;
      color: var(--ink);
      box-shadow: 0 12px 26px rgba(17, 17, 17, 0.08);
      font-size: 14px;
      font-weight: 900;
      position: relative;
      z-index: 1;
    }

    .score-line span {
      color: var(--accent);
    }

    .score-note {
      margin-top: 7px;
      color: #777;
      font-size: 12px;
      line-height: 1.35;
      font-weight: 750;
      position: relative;
      z-index: 1;
    }

    .score-chart {
      grid-column: 1 / -1;
      height: 54px;
      margin-top: -2px;
      padding: 0 14px 10px;
      border-radius: 0 0 28px 28px;
      background: #1c1c1a;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-top: 0;
      position: relative;
      z-index: 1;
    }

    .mini-line {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    .mini-line .area {
      fill: rgba(112, 227, 160, 0.08);
    }

    .mini-line .line {
      fill: none;
      stroke: var(--good);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .mini-line .dot {
      fill: var(--good);
      stroke: #1c1c1a;
      stroke-width: 2;
    }

    .mini-line .goal-line {
      stroke: rgba(17, 17, 17, 0.32);
      stroke-width: 2;
      stroke-dasharray: 6 7;
      stroke-linecap: round;
    }

    .profile-button {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid #e9e8e3;
      color: var(--ink);
      outline: 5px solid rgba(255, 255, 255, 0.82);
      display: grid;
      place-items: center;
      font-weight: 800;
      box-shadow: 0 16px 32px rgba(17, 17, 17, 0.12);
      flex: 0 0 auto;
      position: relative;
      z-index: 1;
    }

    .page-nav {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 20;
      width: min(560px, calc(100vw - 28px));
      transform: translateX(-50%);
      margin-bottom: 0;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid #e8e6df;
      border-radius: var(--radius);
      padding: 6px;
      box-shadow: 0 18px 44px rgba(17, 17, 17, 0.14);
      backdrop-filter: blur(18px);
    }

    .nav-button {
      height: 44px;
      border-radius: 6px;
      background: transparent;
      color: #525760;
      font-weight: 850;
    }

    .nav-button.active {
      background: var(--ink);
      color: #fff;
      box-shadow: 0 12px 26px rgba(24, 25, 29, 0.2);
    }

    .page {
      display: none;
    }

    .page.active {
      display: grid;
      gap: 16px;
    }

    .surface,
    .sheet {
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
    }

    .surface {
      padding: 0;
      position: relative;
      overflow: visible;
    }

    .surface::before,
    .sheet::before {
      content: none;
    }

    .surface > *,
    .sheet > * {
      position: relative;
      z-index: 1;
    }

    .profile-surface {
      max-width: 620px;
      margin: 0 auto;
      width: 100%;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .toolbar h2,
    .sheet h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .toolbar-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .date-input,
    .text-input,
    .number-input,
    .select-input {
      height: 40px;
      border: 1px solid #ece9e3;
      background: rgba(255, 255, 255, 0.86);
      color: var(--ink);
      border-radius: var(--radius);
      padding: 0 11px;
      min-width: 0;
    }

    .date-input {
      width: 150px;
    }

    .icon-button,
    .primary-button,
    .quiet-button,
    .danger-button,
    .chip-button {
      height: 38px;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-width: 40px;
      padding: 0 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .primary-button,
    .quiet-button,
    .danger-button,
    .chip-button,
    .icon-button,
    .nav-button,
    .profile-button {
      will-change: transform;
    }

    .primary-button:hover,
    .quiet-button:hover,
    .danger-button:hover,
    .chip-button:hover,
    .icon-button:hover {
      box-shadow: 0 8px 18px rgba(22, 26, 32, 0.1);
      transform: translateY(-1px);
    }

    .icon-button {
      width: 40px;
      padding: 0;
      background: #fff;
      color: var(--ink);
      border: 1px solid #efeee9;
      box-shadow: var(--shadow-soft);
    }

    .primary-button {
      background: var(--ink);
      color: #fff;
      box-shadow: 0 14px 26px rgba(17, 17, 17, 0.18);
    }

    .quiet-button,
    .chip-button {
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
      border: 1px solid #efeee9;
    }

    .danger-button {
      background: #fff0ee;
      color: #9a2d23;
      border: 1px solid #efc0b9;
    }

    .workout-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    #page-today .toolbar {
      display: none;
    }

    #page-workout .toolbar {
      display: none;
    }

    .exercise-group-card {
      grid-column: 1 / -1;
      display: grid;
      gap: 16px;
      padding: 18px;
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 42%),
        #191918;
      border: 1px solid rgba(255, 255, 255, 0.09);
      box-shadow: var(--shadow-soft);
    }

    .exercise-group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .exercise-group-head h3 {
      margin: 0;
      font-size: 21px;
      font-weight: 900;
    }

    .exercise-group-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .exercise-group-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .counter-card {
      background:
        linear-gradient(180deg, #fff, #fbfbf8);
      border: 1px solid #ebe9e2;
      border-radius: var(--radius);
      padding: 13px;
      min-height: 214px;
      display: grid;
      gap: 9px;
      box-shadow: 0 14px 30px rgba(17, 17, 17, 0.07);
      position: relative;
      overflow: hidden;
    }

    .counter-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 4px;
      background: var(--accent);
      box-shadow: none;
    }

    .counter-card::after {
      content: none;
    }

    .counter-card.bump .count {
      animation: count-pop 260ms ease;
    }

    .card-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 6px;
      min-width: 0;
    }

    .card-title {
      min-width: 0;
    }

    .card-title h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .card-title p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 11px;
    }

    .count-row {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      padding-top: 2px;
    }

    .count {
      font-size: clamp(34px, 8vw, 48px);
      line-height: 1;
      font-weight: 900;
      color: #20242b;
      letter-spacing: 0;
      text-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
    }

    .target-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 48px;
      height: 25px;
      padding: 0 8px;
      border-radius: 999px;
      background: #f5f5f2;
      color: var(--accent);
      box-shadow: none;
      font-size: 11px;
      font-weight: 850;
    }

    .progress-track {
      height: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: #edeae5;
    }

    .progress-fill {
      width: min(100%, var(--progress, 0%));
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      transition: width 220ms ease;
      box-shadow: none;
    }

    .sparkline-panel {
      display: grid;
      grid-template-columns: 1fr;
      gap: 3px;
      align-items: center;
      min-height: 52px;
      padding: 0;
    }

    .sparkline {
      width: 100%;
      height: 42px;
      overflow: visible;
    }

    .sparkline path.area {
      fill: rgba(245, 179, 1, 0.14);
    }

    .sparkline path.line {
      fill: none;
      stroke: var(--gold);
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 7px 10px rgba(240, 182, 29, 0.18));
    }

    .sparkline circle {
      fill: #18191d;
      stroke: #fff;
      stroke-width: 3;
      filter: drop-shadow(0 8px 10px rgba(24, 25, 29, 0.16));
    }

    .sparkline-days {
      display: none;
      justify-content: space-between;
      margin-top: -5px;
      color: #9a958d;
      font-size: 10px;
      font-weight: 800;
    }

    .sparkline-total {
      display: none;
    }

    @keyframes count-pop {
      0% {
        transform: scale(1);
      }
      45% {
        transform: scale(1.15);
        color: var(--accent-2);
      }
      100% {
        transform: scale(1);
      }
    }

    .quick-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .quick-row button {
      height: 36px;
      border-radius: var(--radius);
      color: #fff;
      font-weight: 900;
      letter-spacing: 0;
      font-size: 13px;
    }

    .quick-row button:nth-child(1) {
      background: var(--accent);
    }

    .quick-row button:nth-child(2) {
      background: var(--accent-3);
    }

    .quick-row button:nth-child(3) {
      background: var(--ink);
    }

    .card-tools {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .chip-button {
      height: 32px;
      min-width: 0;
      padding: 0 9px;
      font-size: 12px;
    }

    .sheet {
      padding: 0;
      display: grid;
      gap: 18px;
      position: relative;
      overflow: visible;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .stats-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .stats-top p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 850;
    }

    .period-toggle {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 6px;
      border-radius: 24px;
      background: #fff;
      border: 1px solid #e8e6df;
      box-shadow: 0 12px 28px rgba(17, 17, 17, 0.08);
      min-width: 260px;
    }

    .period-toggle button {
      height: 36px;
      border-radius: 18px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .period-toggle button.active {
      background: var(--ink);
      color: #fff;
    }

    .month-switcher {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 52px;
      padding: 6px;
      border-radius: 26px;
      background: #fff;
      border: 1px solid #e8e6df;
      box-shadow: 0 12px 28px rgba(17, 17, 17, 0.08);
    }

    .month-switcher.show {
      display: flex;
    }

    .month-switcher button {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #f4f4f2;
      color: var(--ink);
      font-size: 24px;
      font-weight: 900;
    }

    .month-switcher strong {
      font-size: 16px;
      font-weight: 900;
    }

    .stat {
      background:
        linear-gradient(180deg, #fff, #fbfbf8);
      border: 1px solid #ebe9e2;
      border-radius: var(--radius);
      padding: 15px;
      min-height: 96px;
      box-shadow: var(--shadow-soft);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .stat strong {
      display: block;
      margin-top: 8px;
      font-size: 31px;
      line-height: 1;
    }

    .stats-workout-list {
      display: grid;
      gap: 14px;
    }

    .exercise-stat-card {
      padding: 18px;
      border-radius: 26px;
      background: #fff;
      box-shadow: 0 18px 42px rgba(17, 17, 17, 0.08);
      border: 1px solid rgba(17, 17, 17, 0.04);
      display: grid;
      gap: 16px;
    }

    .exercise-stat-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .exercise-stat-title {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .exercise-stat-title .icon-bubble {
      width: 52px;
      height: 52px;
      flex: 0 0 auto;
    }

    .exercise-stat-title .icon-bubble svg {
      width: 28px;
      height: 28px;
    }

    .exercise-stat-title h3 {
      margin: 0;
      font-size: 21px;
      font-weight: 900;
      line-height: 1.08;
    }

    .exercise-stat-title p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .exercise-stat-total {
      text-align: right;
      font-size: 28px;
      line-height: 1;
      font-weight: 900;
      color: var(--card-accent, var(--accent));
    }

    .exercise-stat-total span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }

    .stat-bars {
      height: 128px;
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 1fr;
      gap: 5px;
      align-items: end;
      padding-top: 12px;
      position: relative;
      touch-action: pan-y;
      user-select: none;
    }

    .stat-bar {
      min-width: 0;
      min-height: 5px;
      border-radius: 999px 999px 4px 4px;
      background: color-mix(in srgb, var(--card-accent, var(--accent)) 78%, #fff);
      opacity: 0.92;
      position: relative;
    }

    .stat-bar.is-selected {
      opacity: 1;
      outline: 2px solid var(--ink);
      outline-offset: 2px;
    }

    .stat-bar.today {
      background: var(--ink);
    }

    .stat-axis {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 1fr;
      gap: 5px;
      color: #8a8780;
      font-size: 10px;
      font-weight: 800;
      text-align: center;
    }

    .stat-axis span {
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
    }

    .stat-card-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .stat-guide {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 0;
      border-left: 2px dashed rgba(17, 17, 17, 0.42);
      pointer-events: none;
      opacity: 0;
      transform: translateX(-1px);
    }

    .stat-bars.active .stat-guide {
      opacity: 1;
    }

    .stat-tooltip {
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translate(-50%, -100%);
      min-width: 112px;
      padding: 8px 10px;
      border-radius: 14px;
      background: var(--ink);
      color: #fff;
      text-align: center;
      font-size: 12px;
      line-height: 1.25;
      font-weight: 850;
      box-shadow: 0 12px 24px rgba(17, 17, 17, 0.22);
      pointer-events: none;
      opacity: 0;
      white-space: nowrap;
      z-index: 2;
    }

    .stat-bars.active .stat-tooltip {
      opacity: 1;
    }

    .stat-tooltip span {
      display: block;
      margin-top: 3px;
      color: #ffd9cc;
      font-weight: 900;
    }

    .chart {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      align-items: end;
      height: 180px;
      padding-top: 8px;
      padding-inline: 2px;
    }

    .bar-wrap {
      display: grid;
      grid-template-rows: 1fr auto;
      height: 100%;
      gap: 6px;
      min-width: 0;
    }

    .bar {
      align-self: end;
      border-radius: 6px 6px 2px 2px;
      background: linear-gradient(180deg, var(--accent), #ff8e63);
      min-height: 4px;
      position: relative;
      box-shadow: inset 0 -8px 16px rgba(0, 0, 0, 0.08);
    }

    .bar.today {
      background: linear-gradient(180deg, var(--ink), var(--accent));
    }

    .bar-label {
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history {
      display: grid;
      gap: 8px;
      max-height: 320px;
      overflow: auto;
      padding-right: 4px;
    }

    .history-row {
      display: grid;
      grid-template-columns: 92px 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 10px;
      border: 1px solid #ebe9e2;
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow-soft);
    }

    .history-date {
      font-weight: 850;
      font-size: 13px;
    }

    .history-items {
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-total {
      font-weight: 900;
      color: var(--accent);
    }

    .empty {
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 26px 12px;
      background: rgba(255, 255, 255, 0.8);
    }

    dialog {
      width: min(480px, calc(100vw - 28px));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 0;
    }

    }

    .modal {
      padding: 20px;
      display: grid;
      gap: 14px;
    }

    .modal h2 {
      margin: 0;
      font-size: 20px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .exercise-settings {

    }

    .field label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .inline-add-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .unit-input-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .unit-input-row span {
      min-width: 40px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: #f5f5f4;
      color: #111;
      font-size: 14px;
      font-weight: 900;

    .inline-add-row .quiet-button {

      border-radius: 20px;
      padding: 0 16px;
      font-weight: 900;
    }

    .textarea-input {
      min-height: 132px;
      padding: 13px;
      resize: vertical;
      line-height: 1.45;
    }

    .add-section {
      display: grid;
      gap: 10px;
      padding: 12px;
      border-radius: 18px;
      background: #242421;
      border: 1px solid rgba(255, 255, 255, 0.08);

    .add-section h3 {
      margin: 0;
      font-size: 14px;
      font-weight: 900;
    }

    .manage-list {
      display: grid;
      gap: 10px;
    }

    .manage-item {
      display: grid;
      gap: 9px;
      padding: 12px;
      border-radius: 18px;
      background: #242421;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .manage-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: center;
    }

    .manage-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--card-accent, var(--accent));
    }

    .manage-name {
      font-size: 15px;
      font-weight: 900;
    }

    .manage-unit {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .manage-delete {

      height: 30px;
      border-radius: 50%;
      background: #2a1815;
      color: #ff9b88;
      font-weight: 900;
    }

    .goal-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }

    .goal-row input {
      height: 34px;
      min-width: 0;
    }

    .check-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .check-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      min-height: 38px;
      padding: 8px 10px;
      border-radius: var(--radius);
      background: #f7f7f5;
      border: 1px solid #efeee9;
      font-size: 13px;
      font-weight: 800;
    }

    .widget-manager {
      display: grid;
      gap: 10px;
      padding: 12px;
      border-radius: 18px;
      background: #f4f4f2;
    }

    .widget-manager h3 {
      margin: 0;
      font-size: 15px;
      font-weight: 900;
    }

    .widget-order-list {
      display: grid;
      gap: 8px;
    }

    .widget-order-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      min-height: 48px;
      padding: 9px 10px;

      background: #fff;
      border: 1px solid #ecebe6;

    .widget-order-name {

    }

    .widget-order-name strong {
      display: block;
      font-size: 14px;
      line-height: 1.1;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .widget-order-name span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .widget-order-actions {
      display: flex;
      gap: 6px;
    }

    .order-button {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #f4f4f2;
      color: var(--ink);
      font-size: 13px;
      font-weight: 900;
    }

    .order-button:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .widget-meta {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      color: #666;
      font-size: 11px;
      font-weight: 800;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      min-height: 23px;
      padding: 0 8px;
      border-radius: 999px;
      background: #f4f4f2;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .mini-note {

      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .toast {

      transform: translateX(-50%) translateY(30px);
      opacity: 0;
      pointer-events: none;
      background: var(--ink);
      color: #fff;
      border-radius: var(--radius);
      padding: 10px 13px;
      font-weight: 750;
      transition: 180ms ease;
      max-width: min(480px, calc(100vw - 28px));

      z-index: 10;

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .statusbar {
      display: none;
      justify-content: space-between;
      align-items: center;
      padding: 0 18px 28px;
      color: var(--ink);
      font-size: 16px;
      font-weight: 900;
    }

    .status-icons {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      font-size: 15px;
    }

    .app {

    }

    .topbar {

      padding: 0 18px 18px;
      align-items: start;
    }

    .brand p {

    .date-line {
      margin-top: 8px;

    .profile-button {

      height: 76px;
      font-size: 17px;

    .toolbar {

    }

    .toolbar h2,
    .sheet h2 {
      font-size: 34px;
      font-weight: 900;
    }

    .primary-button {
      height: 72px;
      padding: 0 26px;
      border-radius: 26px;
      background: #fff;
      color: var(--ink);
      border: 1px solid #efeee9;
      box-shadow: 0 16px 34px rgba(17, 17, 17, 0.08);
      font-size: 21px;
      font-weight: 850;
    }

    .workout-grid {
      gap: 26px;
    }

    .counter-card {
      min-height: 402px;
      padding: 24px 22px 22px;
      gap: 18px;
      border-radius: 30px;
      box-shadow: 0 24px 50px rgba(17, 17, 17, 0.08);
    }

    .counter-card::before {
      content: none;
    }

    .card-head {
      align-items: start;
      gap: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
    }

    .card-title {
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 16px;
      align-items: center;
    }

    .card-title h3 {
      font-size: clamp(22px, 3.3vw, 29px);
      line-height: 1.05;
    }

    .card-title p {
      margin-top: 8px;
      font-size: 20px;
    }

    .icon-bubble {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--bubble, #ffe7df);
      color: var(--card-accent, var(--accent));
    }

    .icon-bubble svg {
      width: 34px;
      height: 34px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon-button {
      display: none;
    }

    .count-row {
      align-items: center;
      padding-top: 0;
    }

    .count {
      color: var(--card-accent, var(--accent));
      font-size: clamp(29px, 5.2vw, 40px);
      text-shadow: none;
    }

    .count small {
      color: #666;
      font-size: 18px;
      font-weight: 700;
    }

    .target-pill {
      width: 72px;
      height: 72px;
      min-width: 72px;
      padding: 0;
      border-radius: 50%;
      background: conic-gradient(var(--card-accent, var(--accent)) var(--progress), #eee9e3 0);
      color: var(--ink);
      position: relative;
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 650;
    }

    .target-pill::before {
      content: "";

      inset: 10px;
      border-radius: 50%;
      background: #fff;
    }

    .target-pill span {

    .progress-track {

    .sparkline-panel {
      min-height: 104px;
      align-content: center;
    }

    .sparkline {
      height: 88px;
    }

    .sparkline path.area {
      fill: color-mix(in srgb, var(--card-accent, var(--gold)) 12%, transparent);
    }

    .sparkline path.line {
      stroke: var(--card-accent, var(--gold));
      stroke-width: 4.5;
    }

    .sparkline circle {
      fill: var(--card-accent, var(--gold));
      stroke-width: 3.5;
    }

    .sparkline-days {
      display: flex;
      justify-content: space-between;
      margin-top: -8px;
      color: #777;
      font-size: 16px;
      font-weight: 700;

    .sparkline-days span:last-child {
      width: 28px;
      height: 28px;
      margin-top: -6px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--bubble, #ffe7df);

    .quick-row button {

      color: var(--ink);

    .quick-row button:nth-child(3) {
      background: var(--ink);

    }

      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 12px;
      margin-top: -4px;
    }

    .run-button {
      background: var(--ink);

    .chip-button {

      border-radius: 22px;

    .log-card {

      background: #fff;
      box-shadow: 0 24px 50px rgba(17, 17, 17, 0.08);

    .log-head {

      justify-content: space-between;

    }

    .log-title {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .log-icon {
      width: 56px;
      height: 56px;
      border-radius: 20px;

      place-items: center;
      background: var(--bubble, #e8f3ff);

    .log-icon svg {

      height: 30px;

      stroke: currentColor;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;

    .log-title h3 {
      margin: 0;

    }

    .log-title p {

      font-weight: 800;
    }

    .log-record {

      padding: 0 16px;

      background: var(--ink);

      font-weight: 900;

    .log-value {
      display: flex;

    .log-value small {

      font-weight: 800;

    .log-line-panel {

    .log-line-chart {

    .body-card .mini-line .goal-line {

    }

    .log-line-dates {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;

      font-size: 10px;
      font-weight: 800;

    .log-tools {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .log-quick-row {

    .log-quick-row button {

    .record-status {

      align-items: center;
      gap: 6px;

      padding: 0 10px;

      font-weight: 900;

    .record-status.done {

    .record-status.missing {

      background: rgba(255, 143, 117, 0.12);

    .nutrition-group-card {
      grid-column: 1 / -1;
      padding: 18px 20px;
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 42%),
        #191918;
      border: 1px solid rgba(255, 255, 255, 0.09);
      box-shadow: var(--shadow-soft);
      display: grid;
      gap: 4px;
    }

    .nutrition-group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 10px;
    }

    .section-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;

    .section-actions .text-btn {
      height: 34px;
      padding: 0 12px;
      border-radius: 17px;
      background: #242421;
      color: var(--ink);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 12px;
      font-weight: 900;
    }

    .nutrition-group-head h3 {
      margin: 0;
      font-size: 21px;
      font-weight: 900;
    }

    .nutrition-group-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .nutrition-group-list {
      display: grid;
    }

    .nutrition-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(160px, 0.8fr) auto;
      gap: 14px;
      align-items: center;
      padding: 14px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.07);

    .nutrition-row-main {
      min-width: 0;
    }

    .nutrition-name-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .nutrition-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--card-accent, var(--accent));
      flex: 0 0 auto;
    }

    .nutrition-name {
      font-size: 16px;
      font-weight: 900;
    }

      align-items: baseline;
      gap: 5px;

    .nutrition-num {

      color: var(--ink);

      font-weight: 650;

      content: "";

      inset: 7px;
      border-radius: 50%;

    .nutrition-percent span {

      z-index: 1;

      background: transparent;
      border: 0;

    }

      stroke-width: 2.8;

    .nutrition-row .mini-line .dot {

    }

    .nutrition-row .log-line-dates {
      display: none;
    }

    .nutrition-row .log-record {
      width: 52px;
      height: 38px;
      padding: 0;
      border-radius: 19px;
    }

    /* Fitnessku-inspired dark fitness theme */
    :root {
      color-scheme: dark;
      --bg: #10100f;
      --panel: #191918;
      --panel-soft: #252522;
      --ink: #f7f4ed;
      --muted: #aaa59b;
      --line: rgba(255, 255, 255, 0.1);
      --accent: #ff9867;
      --accent-2: #70e3a0;
      --accent-3: #353532;
      --accent-4: #87a7ff;
      --gold: #ffb260;
      --good: #70e3a0;
      --shadow: 0 28px 70px rgba(0, 0, 0, 0.42);
      --shadow-soft: 0 18px 42px rgba(0, 0, 0, 0.28);
    }

    body {
      background: #10100f;
      color: var(--ink);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.75), transparent 62%);
      pointer-events: none;
      z-index: -1;
    }

    .statusbar,
    .brand p,
    .toolbar h2,
    .sheet h2 {
      color: var(--ink);
    }

    .brand {
      display: contents;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
    }

    .brand p,
    .date-line {
      grid-column: 1;
    }

    .profile-button {
      grid-column: 2;

    .quick-row button:nth-child(3) {

    .chip-button.run-button {

    .counter-card .quick-row button,

      color: #ff9b88;
      border-color: rgba(255, 155, 136, 0.2);

    .target-pill {

      color: var(--ink);
    }

    .target-pill::before {
      background: #191918;
    }

    .icon-bubble,
    .sparkline-days span:last-child {
      background: color-mix(in srgb, var(--card-accent, var(--accent)) 18%, #191918);
    }

    .count,
    .log-value,
    .exercise-stat-total,
    .history-total {
      color: var(--card-accent, var(--accent));

    .count small,
    .log-value small {
      color: var(--muted);

    .log-card {
      grid-column: 1 / -1;
      min-height: 150px;
      grid-template-columns: minmax(0, 0.92fr) minmax(220px, 1.08fr);
      grid-template-areas:
        "head bars"
        "value bars";
      align-items: center;
      gap: 16px 22px;

    .log-head {
      grid-area: head;
    }

    .log-card > div:nth-of-type(2) {

    .log-line-panel {
      grid-area: bars;
      align-self: stretch;
      padding: 12px;
      border-radius: 22px;
      background: #111110;
      border: 1px solid rgba(255, 255, 255, 0.06);

      grid-template-columns: minmax(0, 0.9fr) minmax(220px, 1fr);
      grid-template-areas:
        "head bars"
        "value bars";

    .widget-meta,
    .meta-pill,
    .stat-axis,
    .sparkline-days {
      color: #bdb8ad;
    }

    .meta-pill {
      background: #242421;
    }

    .sparkline path.line {
      stroke: var(--accent);
    }

    .sparkline circle,
    .stat-bar {
      background: var(--accent);
      fill: var(--accent);
    }

    .sparkline path.area {
      fill: rgba(255, 152, 103, 0.14);
    }

    .stat-bar {
      background: var(--accent);
    }

    .stat-bar.today {
      background: var(--good);
    }

    .stat-guide {
      border-left-color: rgba(112, 227, 160, 0.72);
    }

    .stat-tooltip,
    .toast {
      background: #242421;
      color: var(--ink);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .stat-tooltip span {
      color: var(--good);
    }

    .run-display,
    .widget-manager,
    .check-pill,
    .text-input,
    .number-input,
    .select-input,
    .empty {

      border-color: rgba(255, 255, 255, 0.08);
    }

    input::placeholder {
      color: #79746d;
    }

      }

    /* Premium iOS home redesign */
    :root {
      color-scheme: light;
      --bg: #f7f7f5;
      --panel: #ffffff;
      --panel-soft: #f3f3f1;
      --ink: #111111;
      --muted: #7b7d86;
      --line: #eeeef0;
      --accent: #ff6a3d;
      --accent-2: #ff6a3d;
      --accent-3: #f1f1ef;
      --accent-4: #111111;
      --gold: #ff6a3d;
      --good: #22c55e;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.05);
      --radius: 28px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Inter, system-ui, sans-serif;
    }

    body {
      background: #f7f7f5;
      color: #111111;
    }

    body::before {
      content: none;
    }

    .app {
      max-width: 920px;
      padding: 34px 22px 118px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: start;
      min-height: 0;
      padding: 0 0 18px;
      margin: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
    }

    .brand {
      display: contents;
      min-width: 0;
    }

    .brand p {
      grid-column: 1;
      color: #111111;
      font-size: clamp(34px, 6vw, 54px);
      line-height: 1.02;
      font-weight: 850;
      letter-spacing: 0;
      max-width: 760px;
    }

    .profile-button {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.86);
      border: 0;
      color: #111111;
      outline: 0;
      box-shadow: 0 8px 26px rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(18px);
      font-size: 16px;
      font-weight: 800;
    }

    .score-card,
    .log-card,
    .nutrition-group-card,
    .exercise-group-card,
    .counter-card,
    .exercise-stat-card,
    .stat,
    .modal,
    dialog {
      background: #ffffff;
      border: 0;
      border-radius: 28px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      color: #111111;
    }

    .score-card {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: minmax(0, 0.8fr) minmax(260px, 1fr);
      grid-template-areas:
        "top top"
        "score chart";
      align-items: end;
      gap: 20px 28px;
      min-height: 205px;
      padding: 28px 32px;
    }

    .score-card-top {
      grid-area: top;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .date-line {
      margin: 0;
      color: #111111;
      font-size: 19px;
      font-weight: 750;
    }

    .score-label {
      min-height: 38px;
      padding: 0 18px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f4;
      color: #111111;
      font-size: 16px;
      font-weight: 650;
    }

    .score-line {
      grid-area: score;
      display: block;
      min-height: 0;
      margin: 0;
      padding: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
      color: #7b7d86;
      font-size: 17px;
      font-weight: 650;
      line-height: 1.2;
    }

    .score-line span {
      display: block;
      margin-top: 10px;
      color: #111111;
      font-size: clamp(58px, 10vw, 86px);
      line-height: 0.9;
      font-weight: 850;
      letter-spacing: 0;
    }

    .score-delta {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      margin-top: 14px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.1);
      color: #16a34a;
      font-size: 13px;
      font-weight: 750;
    }

    .score-delta.down {
      background: rgba(255, 106, 61, 0.1);
      color: #ff6a3d;
    }

    .score-breakdown {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .score-breakdown span {
      display: inline-flex;
      width: auto;
      margin: 0;
      min-height: 24px;
      padding: 0 9px;
      border-radius: 999px;
      background: #f5f5f4;
      color: #7b7d86;
      font-size: 12px;
      font-weight: 700;
      line-height: 24px;
    }

    .score-chart {
      grid-area: chart;
      height: 106px;
      margin: 0;
      padding: 4px 0 0;
      background: transparent;
      border: 0;
      border-radius: 0;
    }

    .score-chart-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-top: 6px;
      color: #9ca0aa;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
    }

    .score-chart .mini-line {
      height: calc(100% - 22px);
    }

    .mini-line .area {
      fill: rgba(255, 106, 61, 0.13);
    }

    .mini-line .line {
      stroke: #ff6a3d;
      stroke-width: 4;
      filter: none;
    }

    .mini-line .dot {
      fill: #ff6a3d;
      stroke: #ffffff;
      stroke-width: 4;
    }

    .workout-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
    }

    .log-card,
    .nutrition-group-card,
    .exercise-group-card {
      grid-column: 1 / -1;
      padding: 28px 32px;
      gap: 24px;
    }

    .log-card {
      min-height: 190px;
      grid-template-columns: minmax(0, 0.75fr) minmax(240px, 1fr);
      grid-template-areas:
        "head bars"
        "value bars"
        "quick quick";
      align-items: center;
    }

    .log-title h3,
    .nutrition-group-head h3,
    .exercise-group-head h3 {
      color: #111111;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .log-title p,
    .nutrition-group-head p,
    .exercise-group-head p,
    .log-sub,
    .nutrition-goal,
    .card-title p,
    .widget-meta,
    .meta-pill {
      color: #7b7d86;
    }

    .log-icon,
    .icon-bubble {
      background: #f4f4f3;
      color: #7b7d86;
      border-radius: 20px;
    }

    .log-value {
      color: #111111;
      font-size: clamp(50px, 8vw, 68px);
      font-weight: 850;
      letter-spacing: 0;
    }

    .log-value small,
    .count small {
      color: #7b7d86;
      font-weight: 500;
    }

    .log-line-panel {
      background: transparent;
      border: 0;
      padding: 0;
      align-self: center;
    }

    .log-line-chart {
      height: 92px;
    }

    .log-line-dates {
      color: #9ca0aa;
    }

    .nutrition-group-head,

      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;

      padding: 0 16px;
      border-radius: 999px;
      background: #f5f5f4;
      color: #7b7d86;
      border: 0;
      font-size: 15px;
      font-weight: 650;
      box-shadow: none;

    .log-record,

      color: #ffffff;
      border: 0;
      box-shadow: none;

      gap: 18px;
    }

    .nutrition-row {

    .nutrition-name-row {

    }

    .nutrition-name {

      font-size: 17px;
      font-weight: 700;
    }

    .nutrition-num {

      font-size: 18px;

      color: #111111;

      grid-template-columns: repeat(2, minmax(0, 1fr));

      font-weight: 800;
    }

      height: 58px;
      min-width: 58px;
      background: #f5f5f4;
      color: #ff6a3d;
      font-size: 14px;
      font-weight: 760;
    }

    .target-pill::before {
      content: none;
    }

    .count {

      font-size: clamp(48px, 7vw, 68px);
      font-weight: 850;
      letter-spacing: 0;

    .widget-meta {

    .meta-pill {

      padding: 0 10px;
      border-radius: 999px;
      background: #f5f5f4;
      font-size: 12px;
      font-weight: 650;

    .sparkline-panel {

    .sparkline {

    .sparkline path.area {

    .sparkline path.line {

      filter: none;

<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <h1 data-i18n="appTitle">Daily Rep Counter</h1>
        <p id="subtitle"></p>
        <p class="header-date-line" id="headerDateLine"></p>
      </div>
      <button class="profile-button" id="profileButton" type="button" title="Profile">ME</button>
    </header>

    <nav class="page-nav" aria-label="App pages">
      <button class="nav-button active" type="button" data-page-target="today" data-i18n="todayPage">Records</button>
      <button class="nav-button" type="button" data-page-target="workout" data-i18n="workoutPage">Workout</button>
      <button class="nav-button" type="button" data-page-target="stats" data-i18n="statsPage">Stats</button>
      <button class="nav-button" type="button" data-page-target="me" data-i18n="myPage">My page</button>
    </nav>

    <section class="page active" id="page-today">
      <section class="score-mini-strip" aria-label="Today score summary"></section>
      <section class="surface" aria-labelledby="todayTitle">
        <div class="toolbar">
          <h2 id="todayTitle" data-i18n="recordPage">Records</h2>
          <div class="toolbar-actions">
            <button class="primary-button" id="addWorkoutButton" type="button" data-i18n="addWorkout">Widget +</button>
          </div>
        </div>
        <div class="workout-grid" id="recordGrid"></div>
      </section>
    </section>

    <section class="page" id="page-workout">
      <section class="score-mini-strip" aria-label="Today score summary"></section>
      <section class="surface" aria-labelledby="workoutTitle">
        <div class="toolbar">
          <h2 id="workoutTitle" data-i18n="workoutPage">Workout</h2>
          <div class="toolbar-actions">
            <button class="primary-button" id="addWorkoutButtonWorkout" type="button" data-i18n="addWorkout">Widget +</button>
          </div>
        </div>
        <div class="workout-grid" id="workoutGrid"></div>
      </section>
    </section>

    <section class="page" id="page-stats">
      <aside class="sheet" aria-labelledby="statsTitle">
        <section class="score-card" aria-label="Today score">
          <div class="score-card-top">
            <div class="date-line" id="todayLine"></div>
            <div class="score-label">Score</div>
          </div>
          <div class="score-line" id="todayScoreLine"></div>
          <div class="score-chart" id="todayCalorieChart"></div>
          <div class="score-trend-area" id="todayScoreTrend"></div>
        </section>
        <h2 id="statsTitle" data-i18n="stats">Stats</h2>
        <div class="stats-top">
          <div>
            <p id="statsRangeLabel"></p>
          </div>
          <button class="text-btn stats-manage-button" type="button" id="openStatsManage">통계 관리</button>
        </div>
        <div class="month-switcher" id="monthSwitcher">
          <button type="button" id="prevStatsMonth" aria-label="Previous month">‹</button>
          <strong id="statsMonthLabel"></strong>
          <button type="button" id="nextStatsMonth" aria-label="Next month">›</button>
        </div>
        <div class="stats-workout-list" id="statsWorkoutList"></div>
      </aside>
    </section>

    <section class="page" id="page-me">
      <section class="score-mini-strip" aria-label="Today score summary"></section>
      <section class="surface profile-surface" aria-labelledby="profileTitle">
        <form class="modal" id="profileForm">
          <h2 id="profileTitle" data-i18n="profile">My page</h2>
          <div class="field">
            <label for="nickname" data-i18n="nickname">Nickname</label>
            <input class="text-input" id="nickname" maxlength="24" autocomplete="nickname">
          </div>
          <div class="field">
            <label for="language" data-i18n="language">Language</label>
            <select class="select-input" id="language">
              <option value="en">English</option>
              <option value="zh">中文</option>
              <option value="ko">한국어</option>
            </select>
          </div>
          <div class="field-grid">
            <div class="field">
              <label for="age">나이</label>
              <input class="number-input" id="age" type="number" min="1" max="120" step="1" placeholder="36">
            </div>
            <div class="field">
              <label for="sex">성별</label>
              <select class="select-input" id="sex">
                <option value="">선택</option>
                <option value="female">여성</option>
                <option value="male">남성</option>
                <option value="other">기타</option>
              </select>
            </div>
            <div class="field">
              <label for="heightCm">키 cm</label>
              <input class="number-input" id="heightCm" type="number" min="80" max="240" step="1" placeholder="175">
            </div>
            <div class="field">
              <label for="weightKg">체중 kg</label>
              <input class="number-input" id="weightKg" type="number" min="20" max="250" step="0.1" placeholder="70">
            </div>
          </div>
          <p class="mini-note" data-i18n="profileHint">Your data is saved in this browser.</p>
          <div class="modal-actions">
            <button class="primary-button" type="submit" data-i18n="save">Save</button>
          </div>
        </form>
      </section>
    </section>
  </main>

  <dialog id="workoutDialog">

      <input type="hidden" id="editingWorkoutId">

        <select class="select-input" id="widgetKind">

        <input class="text-input" id="workoutName" maxlength="28" required>
      </div>
      <div class="field">
        <label for="workoutTarget" data-i18n="dailyTarget">Daily target</label>
        <input class="number-input" id="workoutTarget" type="number" min="0" step="1" value="50">
      </div>
      <div class="field exercise-settings">
        <label for="workoutMet">기본 칼로리 기준</label>
        <input class="number-input" id="workoutMet" type="number" min="1" max="15" step="0.1" value="5">
      </div>
      <div class="field exercise-settings">
        <label for="secondsPerRep">기본 템포 초</label>
        <input class="number-input" id="secondsPerRep" type="number" min="1" max="600" step="1" value="3">
      </div>
      <div class="field" id="comboField">
        <label>조합할 운동</label>
        <div class="check-list" id="comboList"></div>
      </div>
      <section class="widget-manager" id="widgetManager">

        <div class="widget-order-list" id="widgetOrderList"></div>
      </section>
      <div class="modal-actions">
        <button class="danger-button" type="button" id="deleteWorkoutButton" data-i18n="delete">Delete</button>
        <button class="quiet-button" type="button" id="closeWorkout" data-i18n="cancel">Cancel</button>
        <button class="primary-button" type="submit" data-i18n="save">Save</button>
      </div>
    </form>
  </dialog>

  <dialog id="nutritionManageDialog">

        <div class="field-grid">
          <div class="field">
            <label for="newNutritionName">항목명</label>

      <div class="modal-actions">
        <button class="primary-button" type="button" id="closeNutritionManage">완료</button>
      </div>

  </dialog>

    function nutritionKey(workout) {
      const label = String(workout.name || i18n.ko[workout.nameKey] || workout.id || "").trim().toLowerCase();
      if (workout.id === "protein" || /단백질|protein/.test(label)) return "protein";
      if (workout.id === "nutrition-calories" || /칼로리|열량|kcal|calorie|energy/.test(label)) return "calories";
      if (workout.id === "carbs" || /탄수화물|carb/.test(label)) return "carbs";
      if (workout.id === "fat" || /지방|fat/.test(label)) return "fat";
      return label || String(workout.id || "");
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!saved) return structuredClone(defaultState);
        let workouts = Array.isArray(saved.workouts) ? saved.workouts : defaultState.workouts;
        const mergedWorkoutIds = [];
        workouts.forEach((workout) => {
          if (workout.id === "protein" || /단백질|protein/i.test(workout.name || "")) {
            workout.kind = "nutrition";
            workout.name = "단백질";
            workout.target = Number(workout.target || 120);
            workout.unit = "g";
          }
        });
        const seenNutritionTargets = new Map();
        workouts = workouts.filter((workout) => {
          if (workout.kind !== "nutrition") return true;
          const key = nutritionKey(workout);
          if (!key || !seenNutritionTargets.has(key)) {
            if (key) seenNutritionTargets.set(key, workout.id);
            return true;
          }
          mergedWorkoutIds.push({ from: workout.id, to: seenNutritionTargets.get(key) });
          return false;
        });
        Object.keys(saved.records || {}).forEach((dateKey) => {
          mergedWorkoutIds.forEach(({ from, to }) => {
            if (from === to) return;
            const record = saved.records[dateKey];
            if (record[from] !== undefined) {
              record[to] = Math.max(Number(record[to] || 0), Number(record[from] || 0));
              delete record[from];
            }
          });
          if (Object.keys(saved.records[dateKey]).length === 0) delete saved.records[dateKey];
        });
        saved.lastActions = Array.isArray(saved.lastActions)
          ? saved.lastActions.map((item) => {
              const merged = mergedWorkoutIds.find(({ from }) => from === item.workoutId);
              return merged ? { ...item, workoutId: merged.to } : item;
            })
          : [];
        defaultState.workouts.forEach((defaultWorkout) => {
          if (defaultWorkout.kind === "nutrition" && workouts.some((workout) => workout.kind === "nutrition" && nutritionKey(workout) === nutritionKey(defaultWorkout))) {
            return;
          }
          if (!workouts.some((workout) => workout.id === defaultWorkout.id)) {
            workouts.push(structuredClone(defaultWorkout));
          }
        });
        const hasCustomCalories = workouts.some((workout) => {
          return workout.kind === "nutrition"
            && workout.id !== "nutrition-calories"
            && (workout.unit === "kcal" || /칼로리|열량|calorie/i.test(workout.name || ""));
        });
        if (hasCustomCalories) {
          const hasDefaultCalorieRecords = Object.values(saved.records || {}).some((record) => {
            return Number(record?.["nutrition-calories"] || 0) > 0;
          });
          if (!hasDefaultCalorieRecords) {
            const defaultCalorieIndex = workouts.findIndex((workout) => workout.id === "nutrition-calories");
            if (defaultCalorieIndex !== -1) workouts.splice(defaultCalorieIndex, 1);
          }
        }
        workouts.forEach((workout) => {
          const defaults = defaultState.workouts.find((item) => item.id === workout.id);
          workout.kind ||= defaults?.kind || "exercise";
          workout.met = Number(workout.met || defaults?.met || 4);
          workout.secondsPerRep = Number(workout.secondsPerRep || defaults?.secondsPerRep || 3);
          workout.unit ||= defaults?.unit || "";
          if (workout.kind === "water") {
            workout.mode = "count";
            workout.cupMl = Number(workout.cupMl || defaults?.cupMl || 250);
            if (!workout.sipConfigured && workout.cupMl === 250) workout.cupMl = 20;
            workout.sipConfigured = true;
            workout.unit = "회";
            workout.targetMl = Number(workout.targetMl || defaults?.targetMl || 2000);
            if (!workout.target || Number(workout.target) > 100) workout.target = defaults?.target || 8;
          }
          if (workout.kind === "nutrition") {
            const nutritionLabel = workout.name || defaults?.name || i18n.ko[workout.nameKey] || "";
            const inferredUnit = inferNutritionUnit(nutritionLabel);
            if (!workout.unit || shouldReplaceNutritionUnit(workout.unit, inferredUnit, nutritionLabel)) {
              workout.unit = inferredUnit;
            }
          }
          if (workout.kind === "combo") workout.components ||= defaults?.components || [];
        });
        return {
          ...structuredClone(defaultState),
          ...saved,
          profile: { ...defaultState.profile, ...saved.profile },
          workouts,
          records: saved.records || {},
          waterLogs: saved.waterLogs || {},
          statsSections: Array.isArray(saved.statsSections) ? saved.statsSections : [],
          lastActions: Array.isArray(saved.lastActions) ? saved.lastActions : []
        };
      } catch {
        return structuredClone(defaultState);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function t(key, params = {}) {
      const lang = state.profile.language || "ko";
      const template = (i18n[lang] && i18n[lang][key]) || i18n.en[key] || key;
      return Object.entries(params).reduce((text, [name, value]) => {
        return text.replaceAll(`{${name}}`, value);
      }, template);
    }

    function todayKey() {
      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: "Asia/Bangkok",
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).formatToParts(new Date());
      const values = Object.fromEntries(parts.map((part) => [part.type, part.value]));
      return `${values.year}-${values.month}-${values.day}`;
    }

    function addDays(dateKey, amount) {
      const [year, month, day] = dateKey.split("-").map(Number);
      const date = new Date(Date.UTC(year, month - 1, day));
      date.setUTCDate(date.getUTCDate() + amount);
      return date.toISOString().slice(0, 10);
    }

    function addMonths(monthKey, amount) {
      const [year, month] = monthKey.split("-").map(Number);
      const date = new Date(Date.UTC(year, month - 1 + amount, 1));
      return date.toISOString().slice(0, 7);
    }

    function daysInMonth(monthKey) {
      const [year, month] = monthKey.split("-").map(Number);
      return new Date(Date.UTC(year, month, 0)).getUTCDate();
    }

    function formatMonthLabel(monthKey) {
      const [year, month] = monthKey.split("-").map(Number);
      if ((state.profile.language || "ko") === "en") {
        return new Intl.DateTimeFormat("en-US", { month: "long", year: "numeric" }).format(new Date(Date.UTC(year, month - 1, 1)));
      }
      return `${year}년 ${month}월`;
    }

    function formatThaiDate(dateKey) {
      const [year, month, day] = dateKey.split("-").map(Number);
      const date = new Date(Date.UTC(year, month - 1, day, 12));
      const weekday = new Intl.DateTimeFormat("ko-KR", {
        timeZone: "Asia/Bangkok",
        weekday: "short"
      }).format(date);
      return `${year}년${month}월${day}일(${weekday})`;
    }

    function getCount(dateKey, workoutId) {
      return Number(state.records[dateKey]?.[workoutId] || 0);
    }

    function setCount(dateKey, workoutId, value, options = {}) {
      const nextValue = Math.max(0, Number(value) || 0);
      state.records[dateKey] ||= {};
      if (nextValue === 0) {
        delete state.records[dateKey][workoutId];
      } else {
        state.records[dateKey][workoutId] = nextValue;
      }
      if (Object.keys(state.records[dateKey]).length === 0) {
        delete state.records[dateKey];
      }
      saveState();
      if (options.silent) return;
      render();
      if (options.bump) bumpWorkout(options.bump);
    }

    function workoutName(workout) {
      return workout.nameKey ? t(workout.nameKey) : workout.name;
    }

    function getWorkout(workoutId) {
      return state.workouts.find((workout) => workout.id === workoutId);
    }

    function baseExercises() {
      return state.workouts.filter((workout) => !workout.kind || workout.kind === "exercise");
    }

    function weightKg() {
      return Number(state.profile.weightKg) || 70;
    }

    function kcalForWorkout(workout, count) {
      if (workout.kind === "combo") {
        return (workout.components || []).reduce((sum, componentId) => {
          const component = getWorkout(componentId);
          return sum + (component ? kcalForWorkout(component, count) : 0);
        }, 0);
      }
      if (workout.kind && workout.kind !== "exercise") return 0;
      const minutes = (Number(workout.secondsPerRep) || 3) * count / 60;
      return 0.0175 * (Number(workout.met) || 4) * weightKg() * minutes;
    }

    function exerciseKcalForDate(dateKey) {
      return state.workouts.reduce((sum, workout) => {
        const count = getCount(dateKey, workout.id);
        if (!count) return sum;
        if (!workout.kind || workout.kind === "exercise") {
          return sum + kcalForWorkout(workout, count);
        }
        if (workout.kind === "combo") {
          const hasLinkedCounts = (workout.components || []).some((componentId) => getCount(dateKey, componentId) > 0);
          return hasLinkedCounts ? sum : sum + kcalForWorkout(workout, count);
        }
        return sum;
      }, 0);
    }

    function todayCalories() {
      return Math.round(exerciseKcalForDate(todayKey()));
    }

    function difficultyPoint(workout) {
      const met = Number(workout.met || 4);
      if (met >= 8) return 2;
      if (met >= 5) return 1.5;
      if (met >= 3) return 1;
      return 0.5;
    }

    function workoutPointForCount(workout, count) {
      if (!count) return 0;
      if (workout.kind === "combo") {
        const components = (workout.components || []).map((id) => getWorkout(id)).filter(Boolean);
        const average = components.length
          ? components.reduce((sum, item) => sum + difficultyPoint(item), 0) / components.length
          : 1;
        return count * average;
      }
      if (!workout.kind || workout.kind === "exercise") return count * difficultyPoint(workout);
      return 0;
    }

    function waterPointForDate(dateKey, workout) {
      const ml = waterTotalMlForDate(dateKey, workout);
      const goal = waterGoalMl(workout);
      const ratio = ml / Math.max(1, goal);
      if (ratio >= 1) return 10;
      if (ratio >= 0.7) return 5;
      if (ratio >= 0.5) return 3;
      return 0;
    }

    function scoreForDate(dateKey) {
      return Math.round(state.workouts.reduce((sum, workout) => {
        const count = getCount(dateKey, workout.id);
        if (!count) return sum;
        if (workout.kind === "body") return sum + 5;
        if (workout.kind === "water") return sum + waterPointForDate(dateKey, workout);
        if (workout.kind === "nutrition") return sum + 3;
        return sum + workoutPointForCount(workout, count);
      }, 0));
    }

    function scoreBreakdownForDate(dateKey) {
      return state.workouts.reduce((parts, workout) => {
        const count = getCount(dateKey, workout.id);
        if (!count) return parts;
        if (workout.kind === "body") parts.record += 5;
        else if (workout.kind === "water") parts.water += waterPointForDate(dateKey, workout);
        else if (workout.kind === "nutrition") parts.nutrition += 3;
        else parts.workout += workoutPointForCount(workout, count);
        return parts;
      }, { workout: 0, record: 0, nutrition: 0, water: 0 });
    }

    function displayKind(workout) {
      if (workout.kind === "combo") return "조합 운동";
      if (workout.kind === "nutrition") return "영양소 섭취 기록";
      if (workout.kind === "body") return "체중 기록";
      if (workout.kind === "water") return "수분 섭취 횟수";
      return "개별 운동";
    }

    function scoreRuleLabel(workout) {
      if (workout.kind === "body") return "기록 1회 완료 시 5점";
      if (workout.kind === "water") return "기록 1회 완료 시 1점";
      if (workout.kind === "nutrition") return "항목별 기록 1회 완료 시 3점";
      if (workout.kind === "combo") return "횟수와 난이도 기준 점수";
      return "횟수와 난이도 기준 점수";
    }

    function linkedNames(workout) {
      if (workout.kind !== "combo") return "";
      return (workout.components || []).map((id) => {
        const component = getWorkout(id);
        return component ? workoutName(component) : "";
      }).filter(Boolean).join(" + ");

    function unitForWorkout(workout) {
      if (workout.unit) return workout.unit;
      if (workout.kind === "nutrition") return inferNutritionUnit(workoutName(workout));
      if (workout.kind === "body") return "kg";
      if (workout.kind === "water") return "회";
      return "회";
    }

    function inferNutritionUnit(name = "") {
      const label = String(name).toLowerCase();
      if (/칼로리|열량|kcal|calorie|energy/.test(label)) return "kcal";
      if (/나트륨|소듐|sodium|콜레스테롤|cholesterol|칼슘|calcium|철분|iron|마그네슘|magnesium|아연|zinc|비타민|vitamin|오메가|omega/.test(label)) return "mg";
      if (label === "물" || /수분|water/.test(label)) return "ml";
      return "g";
    }

    function shouldReplaceNutritionUnit(unit, inferredUnit, name = "") {
      if (!unit || unit === inferredUnit) return !unit;
      const label = String(name).toLowerCase();
      const isEnergy = /칼로리|열량|kcal|calorie|energy/.test(label);
      const isMicro = /나트륨|소듐|sodium|콜레스테롤|cholesterol|칼슘|calcium|철분|iron|마그네슘|magnesium|아연|zinc|비타민|vitamin|오메가|omega/.test(label);
      const isWater = label === "물" || /수분|water/.test(label);
      if (unit === "ml" && /탄수화물|carb/.test(label)) return true;
      return unit === "g" && (isEnergy || isMicro || isWater);
    }

    function totalForDate(dateKey) {
