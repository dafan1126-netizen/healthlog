    function weeklyWorkoutValues(endDate, workoutId) {
      return Array.from({ length: 7 }, (_, index) => {
        const dateKey = addDays(endDate, index - 6);
        return {
          dateKey,
          label: dateKey.slice(8),
          value: getCount(dateKey, workoutId)
        };
      });
    }

    function shortMonthDay(dateKey) {
      const [, month, day] = dateKey.split("-");
      return `${Number(month)}/${Number(day)}`;
    }

    function latestWorkoutEntry(workoutId, endDate = todayKey()) {
      let cursor = endDate;
      for (let index = 0; index < 365; index += 1) {
        const value = getCount(cursor, workoutId);
        if (value > 0) return { dateKey: cursor, value };
        cursor = addDays(cursor, -1);
      }
      return null;
    }

    function previousWorkoutEntry(workoutId, beforeDateKey) {
      let cursor = addDays(beforeDateKey, -1);
      for (let index = 0; index < 365; index += 1) {
        const value = getCount(cursor, workoutId);
        if (value > 0) return { dateKey: cursor, value };
        cursor = addDays(cursor, -1);
      }
      return null;
    }

    function fillForwardWorkoutValues(values, workoutId) {
      let carried = null;
      return values.map((item) => {
        const value = Number(item.value || 0);
        if (value > 0) carried = value;
        if (carried === null) {
          const previous = previousWorkoutEntry(workoutId, item.dateKey);
          carried = previous ? previous.value : 0;
        }
        return { ...item, value: carried || 0 };
      });
    }

    function formatWeightValue(value) {
      if (!value) return "—";
      return Number(value).toFixed(1).replace(/\.0$/, "");
    }

    function formatWeightTimestamp(dateKey) {
      const [year, month, day] = dateKey.split("-");
      const nowKey = todayKey();
      const time = dateKey === nowKey
        ? new Intl.DateTimeFormat("ko-KR", {
            timeZone: "Asia/Bangkok",
            hour: "2-digit",
            minute: "2-digit",
            hour12: false
          }).format(new Date())
        : "08:30";
      return `${year}.${month}.${day} ${time}`;
    }

    function buildWeightHistory(values, todayDateKey) {
      return values.map((item) => `
        <div class="weight-history-item${item.dateKey === todayDateKey ? " today" : ""}">
          <span class="weight-history-date">${shortMonthDay(item.dateKey)}</span>
          <strong class="weight-history-value">${formatWeightValue(item.value)}</strong>
        </div>
      `).join("");
    }

    function buildWorkoutHistory(values, todayDateKey) {
      return values.map((item) => `
        <div class="workout-history-item${item.dateKey === todayDateKey ? " today" : ""}">
          <span class="workout-history-date">${shortMonthDay(item.dateKey)}</span>
          <strong class="workout-history-value">${Number(item.value || 0)}</strong>
        </div>
      `).join("");
    }

    function waterGoalMl(workout) {
      return Number(workout.targetMl || 0) > 0 ? Number(workout.targetMl) : 2000;
    }

    function waterSipMl(workout) {
      return Math.max(1, Number(workout.cupMl || 20) || 20);
    }

    function waterTotalMlForDate(dateKey, workout) {
      const logs = state.waterLogs?.[dateKey]?.[workout.id];
      if (logs && typeof logs === "object") {
        return Object.values(logs).reduce((sum, ml) => sum + Math.max(0, Number(ml) || 0), 0);
      }
      return getCount(dateKey, workout.id) * waterSipMl(workout);
    }

    function formatLiters(ml) {
      return (ml / 1000).toFixed(1);
    }

    function waterBucketDefinitions() {
      return [
        { key: "08", label: "08시", hour: 8 },
        { key: "10", label: "10시", hour: 10 },
        { key: "12", label: "12시", hour: 12 },
        { key: "14", label: "14시", hour: 14 },
        { key: "16", label: "16시", hour: 16 },
        { key: "18", label: "18시", hour: 18 },
        { key: "20", label: "20시", hour: 20 },
        { key: "22", label: "22시", hour: 22 }
      ];
    }

    function bangkokHour() {
      return Number(new Intl.DateTimeFormat("en-US", {
        timeZone: "Asia/Bangkok",
        hour: "2-digit",
        hour12: false
      }).format(new Date()));
    }

    function waterBucketForHour(hour) {
      if (hour < 9) return "08";
      if (hour < 11) return "10";
      if (hour < 13) return "12";
      if (hour < 15) return "14";
      if (hour < 17) return "16";
      if (hour < 19) return "18";
      if (hour < 21) return "20";
      return "22";
    }

    function waterLogsForDate(dateKey, workout, count) {
      const dayLogs = state.waterLogs?.[dateKey]?.[workout.id];
      const bucketValues = Object.fromEntries(waterBucketDefinitions().map((bucket) => [bucket.key, 0]));
      if (dayLogs && typeof dayLogs === "object") {
        Object.entries(dayLogs).forEach(([bucket, ml]) => {
          if (bucketValues[bucket] !== undefined) bucketValues[bucket] = Math.max(0, Number(ml) || 0);
        });
      }
      const loggedMl = Object.values(bucketValues).reduce((sum, ml) => sum + ml, 0);
      const totalMl = count * waterSipMl(workout);
      if (!loggedMl && totalMl > 0) {
        bucketValues[waterBucketForHour(bangkokHour())] = totalMl;
      }
      return bucketValues;
    }

    function addWaterSip(workout, amount = 1) {
      const dateKey = todayKey();
      const sipCount = Math.max(1, Number(amount) || 1);
      const sipMl = waterSipMl(workout);
      const bucket = waterBucketForHour(bangkokHour());
      state.waterLogs ||= {};
      state.waterLogs[dateKey] ||= {};
      state.waterLogs[dateKey][workout.id] ||= {};
      state.waterLogs[dateKey][workout.id][bucket] = Number(state.waterLogs[dateKey][workout.id][bucket] || 0) + sipCount * sipMl;
      const before = getCount(dateKey, workout.id);
      state.lastActions.push({ dateKey, workoutId: workout.id, amount: sipCount, linked: [], waterBucket: bucket, waterMl: sipCount * sipMl });
      state.lastActions = state.lastActions.slice(-20);
      setCount(dateKey, workout.id, before + sipCount, { bump: workout.id });
    }

    function buildWaterCups(bucketValues, targetMl) {
      const buckets = waterBucketDefinitions();
      const bucketTarget = Math.max(20, targetMl / buckets.length);
      return buckets.map((bucket) => {
        const ml = Math.max(0, Number(bucketValues[bucket.key] || 0));
        const ratio = Math.min(1, ml / Math.max(1, bucketTarget * 1.2));
        const fillHeight = ml > 0 ? Math.max(6, ratio * 25) : 0;
        const fillY = 39.4 - fillHeight;
        const filled = ml > 0;
        const level = !filled ? "unfilled" : ml <= bucketTarget * 0.55 ? "low" : ml <= bucketTarget * 1.15 ? "ok" : ml <= bucketTarget * 1.55 ? "high" : "overflow";
        return `
          <div class="water-cup-item ${filled ? `filled ${level}` : "unfilled"}">
            <span class="water-cup-amount">${filled ? `${Math.round(ml)}ml` : ""}</span>
            <div class="water-cup" aria-hidden="true">
              <svg viewBox="0 0 32 44">
                <path class="cup-outline" d="M7 3h18l-2 36a3 3 0 0 1-3 2.8h-8a3 3 0 0 1-3-2.8L7 3Z"/>
                ${level === "overflow" ? `<path class="cup-overflow" d="M9.2 2.4c3.2-1.8 5.9 1.1 9.2-.3 2.4-1 4.1-.4 5.4.7"/>` : ""}
                <rect class="cup-fill" x="9.4" y="${fillY.toFixed(1)}" width="13.2" height="${fillHeight.toFixed(1)}" rx="2"/>
              </svg>
            </div>
            <span class="water-cup-label">${bucket.label}</span>
          </div>
        `;
      }).join("");
    }

    function buildWaterWeekHistory(endDate, workout) {
      const targetMl = waterGoalMl(workout);
      return Array.from({ length: 7 }, (_, index) => {
        const dateKey = addDays(endDate, index - 6);
        const ml = waterTotalMlForDate(dateKey, workout);
        const percent = Math.min(100, Math.round((ml / Math.max(1, targetMl)) * 100));
        const progress = Math.min(360, Math.round((ml / Math.max(1, targetMl)) * 360));
        return `
          <div class="water-week-item${dateKey === endDate ? " today" : ""}">
            <span class="water-week-date">${shortMonthDay(dateKey)}</span>
            <span class="water-week-amount">${formatLiters(ml)}L</span>
            <div class="water-week-ring" style="--ring-progress:${progress}deg"><span>${percent}%</span></div>
          </div>
        `;
      }).join("");
    }

    function demoRandom(seed) {
      let value = seed;
      return () => {
        value = (value * 1664525 + 1013904223) % 4294967296;
        return value / 4294967296;
      };
    }

    function seedPreviewData() {
      const version = "preview-30-days-v2";
      if (state.previewDataVersion === version) return;
      const random = demoRandom(20260616);
      const endDate = todayKey();
      const exerciseWorkouts = state.workouts.filter((workout) => !workout.kind || workout.kind === "exercise");
      const comboWorkouts = state.workouts.filter((workout) => workout.kind === "combo");
      const nutritionWorkouts = state.workouts.filter((workout) => workout.kind === "nutrition");
      const bodyWorkout = state.workouts.find((workout) => workout.kind === "body");
      const waterWorkout = state.workouts.find((workout) => workout.kind === "water");
      const waterBuckets = waterBucketDefinitions().map((bucket) => bucket.key);
      state.records ||= {};
      state.waterLogs ||= {};
      for (let offset = 29; offset >= 0; offset -= 1) {
        const dateKey = addDays(endDate, -offset);
        const age = 29 - offset;
        const weekday = new Date(`${dateKey}T12:00:00Z`).getUTCDay();
        const effortWave = 0.58 + Math.sin(age / 3.2) * 0.22 + (random() - 0.5) * 0.26;
        const restDay = weekday === 0 || random() < 0.11;
        state.records[dateKey] = state.records[dateKey] || {};
        exerciseWorkouts.forEach((workout, index) => {
          const target = Math.max(10, Number(workout.target) || 30);
          const consistency = index === 0 ? 0.88 : index === 1 ? 0.78 : 0.64;
          const shouldRecord = !restDay && random() < consistency;
          const value = shouldRecord ? Math.max(1, Math.round(target * Math.max(0.12, Math.min(1.18, effortWave + (random() - 0.45) * 0.28)))) : 0;
          if (value > 0) state.records[dateKey][workout.id] = value;
          else delete state.records[dateKey][workout.id];
        });
        comboWorkouts.forEach((workout) => {
          const target = Math.max(8, Number(workout.target) || 20);
          const value = !restDay && random() < 0.38 ? Math.round(target * (0.35 + random() * 0.55)) : 0;
          if (value > 0) state.records[dateKey][workout.id] = value;
          else delete state.records[dateKey][workout.id];
        });
        nutritionWorkouts.forEach((workout) => {
          const target = Math.max(1, Number(workout.target) || 100);
          const key = nutritionKey(workout);
          const base = key === "calories" ? 0.74 : key === "protein" ? 0.68 : key === "carbs" ? 0.7 : 0.62;
          const shouldRecord = random() < 0.82;
          const ratio = Math.max(0.28, Math.min(1.08, base + Math.sin((age + target) / 4.7) * 0.14 + (random() - 0.5) * 0.24));
          const value = shouldRecord ? Math.round(target * ratio) : 0;
          if (value > 0) state.records[dateKey][workout.id] = value;
          else delete state.records[dateKey][workout.id];
        });
        if (bodyWorkout) {
          const trend = 74.2 - age * 0.055;
          const value = Math.max(60, trend + (random() - 0.5) * 0.45);
          if (age % 3 !== 1 || offset < 7) state.records[dateKey][bodyWorkout.id] = Number(value.toFixed(1));
          else delete state.records[dateKey][bodyWorkout.id];
        }
        if (waterWorkout) {
          const targetMl = waterGoalMl(waterWorkout);
          const sipMl = waterSipMl(waterWorkout);
          const ratio = Math.max(0.35, Math.min(1.08, 0.68 + Math.sin(age / 4) * 0.18 + (random() - 0.5) * 0.22));
          const totalMl = Math.round(targetMl * ratio / sipMl) * sipMl;
          const sipCount = Math.max(0, Math.round(totalMl / sipMl));
          if (sipCount > 0) state.records[dateKey][waterWorkout.id] = sipCount;
          else delete state.records[dateKey][waterWorkout.id];
          state.waterLogs[dateKey] ||= {};
          state.waterLogs[dateKey][waterWorkout.id] = {};
          let remaining = totalMl;
          waterBuckets.forEach((bucket, index) => {
            if (remaining <= 0) return;
            const leftBuckets = waterBuckets.length - index;
            const baseMl = Math.max(0, Math.round((remaining / leftBuckets) / sipMl) * sipMl);
            const variation = Math.round(((random() - 0.42) * sipMl * 3) / sipMl) * sipMl;
            const ml = Math.max(0, Math.min(remaining, baseMl + variation));
            if (ml > 0) state.waterLogs[dateKey][waterWorkout.id][bucket] = ml;
            remaining -= ml;
          });
          if (remaining > 0) {
            const lastBucket = waterBuckets[waterBuckets.length - 1];
            state.waterLogs[dateKey][waterWorkout.id][lastBucket] = Number(state.waterLogs[dateKey][waterWorkout.id][lastBucket] || 0) + remaining;
          }
        }
        if (Object.keys(state.records[dateKey]).length === 0) delete state.records[dateKey];
      }
      state.previewDataVersion = version;
      state.lastActions = [];
      saveState();
    }

    function buildSparkline(values) {
      const width = 230;
      const height = 58;
      const pad = 8;
      const max = Math.max(1, ...values.map((item) => item.value));
      const points = values.map((item, index) => {
        const x = pad + (index / Math.max(1, values.length - 1)) * (width - pad * 2);
        const y = height - pad - (item.value / max) * (height - pad * 2);
        return { x, y };
      });
      const line = points.reduce((path, point, index) => {
        if (index === 0) return `M ${point.x.toFixed(1)} ${point.y.toFixed(1)}`;
        const prev = points[index - 1];
        const midX = (prev.x + point.x) / 2;
        return `${path} C ${midX.toFixed(1)} ${prev.y.toFixed(1)}, ${midX.toFixed(1)} ${point.y.toFixed(1)}, ${point.x.toFixed(1)} ${point.y.toFixed(1)}`;
      }, "");
      const area = `${line} L ${points[points.length - 1].x.toFixed(1)} ${height - pad} L ${points[0].x.toFixed(1)} ${height - pad} Z`;
      const last = points[points.length - 1];
      const dayLabels = ["M", "T", "W", "T", "F", "S", "S"];
      const labels = values.map((item, index) => `<span>${dayLabels[index]}</span>`).join("");
      return `
        <div>
          <svg class="sparkline" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" aria-hidden="true">
            <path class="area" d="${area}"></path>
            <path class="line" d="${line}"></path>
            <circle cx="${last.x.toFixed(1)}" cy="${last.y.toFixed(1)}" r="5"></circle>
          </svg>
          <div class="sparkline-days">${labels}</div>
        </div>
      `;
    }

    function buildWorkoutTrend(values, target = 0) {
      const width = 230;
      const height = 58;
      const padX = 8;
      const padY = 8;
      const numericValues = values.map((item) => Number(item.value) || 0);
      const max = Math.max(1, Number(target) || 0, ...numericValues);
      const points = values.map((item, index) => {
        const value = Number(item.value) || 0;
        const x = padX + (index / Math.max(1, values.length - 1)) * (width - padX * 2);
        const y = height - padY - (value / max) * (height - padY * 2);
        return { x, y };
      });
      const line = points.reduce((path, point, index) => {
        if (index === 0) return `M ${point.x.toFixed(1)} ${point.y.toFixed(1)}`;
        const prev = points[index - 1];
        const curve = Math.min(12, Math.max(6, Math.abs(point.x - prev.x) * 0.42));
        return `${path} C ${(prev.x + curve).toFixed(1)} ${prev.y.toFixed(1)}, ${(point.x - curve).toFixed(1)} ${point.y.toFixed(1)}, ${point.x.toFixed(1)} ${point.y.toFixed(1)}`;
      }, "");
      const baseline = height - padY;
      const area = `${line} L ${points[points.length - 1].x.toFixed(1)} ${baseline} L ${points[0].x.toFixed(1)} ${baseline} Z`;
      const last = points[points.length - 1];
      const dayLabels = ["M", "T", "W", "T", "F", "S", "S"];
      const labels = values.map((item, index) => `<span class="${index === values.length - 1 ? "active" : ""}">${dayLabels[index]}</span>`).join("");
      return `
        <div class="workout-trend">
          <svg class="workout-trend-svg" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" aria-hidden="true">
            <path class="workout-trend-area" d="${area}"></path>
            <path class="workout-trend-line" d="${line}"></path>
            <circle class="workout-trend-dot" cx="${last.x.toFixed(1)}" cy="${last.y.toFixed(1)}" r="3.5"></circle>
          </svg>
          <div class="workout-trend-days">${labels}</div>
        </div>
      `;
    }

    function buildMiniLine(values, options = {}) {
      const width = options.width || 230;
      const height = options.height || 58;
      const pad = options.pad || 8;
      const goal = Number(options.goal || 0);
      const numericValues = values.map((item) => Number(item.value) || 0);
      const max = Number(options.max || 0) || Math.max(1, goal, ...numericValues);
      const positiveValues = numericValues.filter((value) => value > 0);
      if (goal > 0) positiveValues.push(goal);
      const min = options.allowRange ? Math.min(...positiveValues, max) : 0;
      const range = Math.max(1, max - min);
      const points = values.map((item, index) => {
        const value = Number(item.value) || 0;
        const x = pad + (index / Math.max(1, values.length - 1)) * (width - pad * 2);
        const scaled = options.allowRange && value > 0 ? (value - min) / range : value / max;
        const y = height - pad - scaled * (height - pad * 2);
        return { x, y };
      });
      const line = points.reduce((path, point, index) => {
        if (index === 0) return `M ${point.x.toFixed(1)} ${point.y.toFixed(1)}`;
        const prev = points[index - 1];
        const midX = (prev.x + point.x) / 2;
        return `${path} C ${midX.toFixed(1)} ${prev.y.toFixed(1)}, ${midX.toFixed(1)} ${point.y.toFixed(1)}, ${point.x.toFixed(1)} ${point.y.toFixed(1)}`;
      }, "");
      const area = `${line} L ${points[points.length - 1].x.toFixed(1)} ${height - pad} L ${points[0].x.toFixed(1)} ${height - pad} Z`;
      const last = points[points.length - 1];
      const preserveAspectRatio = options.preserveAspectRatio || "none";
      const goalLine = goal > 0
        ? (() => {
            const scaled = options.allowRange ? (goal - min) / range : goal / max;
            const y = height - pad - Math.max(0, Math.min(1, scaled)) * (height - pad * 2);
            return `<line class="goal-line" x1="${pad}" y1="${y.toFixed(1)}" x2="${width - pad}" y2="${y.toFixed(1)}"></line>`;
          })()
        : "";
      return `
        <svg class="mini-line ${options.className || ""}" viewBox="0 0 ${width} ${height}" preserveAspectRatio="${preserveAspectRatio}" aria-hidden="true">
          ${goalLine}
          <path class="area" d="${area}"></path>
          <path class="line" d="${line}"></path>
          <circle class="dot" cx="${last.x.toFixed(1)}" cy="${last.y.toFixed(1)}" r="4"></circle>
        </svg>
      `;
    }

    function totalForRange(endDate, days) {
      let total = 0;
      for (let i = 0; i < days; i += 1) {
        total += totalForDate(addDays(endDate, -i));
      }
      return total;
    }

      let count = 0;

      while (totalForDate(cursor) > 0) {

        cursor = addDays(cursor, -1);

    }

    function renderNutritionGroup(targetGrid = els.recordGrid) {
      const dateKey = todayKey();
      const seenNutrition = new Set();
      const nutritionItems = state.workouts
        .filter((workout) => {
          if (workout.kind !== "nutrition") return false;
          const key = nutritionKey(workout);
          if (seenNutrition.has(key)) return false;
          seenNutrition.add(key);
          return true;
        })
        .sort((a, b) => {
          const rank = (workout) => /단백질|protein/i.test(workoutName(workout)) ? -1 : 0;
          return rank(a) - rank(b);
        });
      if (!nutritionItems.length) return;
      const card = document.createElement("article");
      card.className = "nutrition-group-card";
      const rows = nutritionItems.map((workout, index) => {
        const count = getCount(dateKey, workout.id);
        const target = Number(workout.target || 0);
        const unit = unitForWorkout(workout);
        const progress = target > 0 ? Math.min(100, (count / target) * 100) : (count > 0 ? 28 : 0);
        const accent = nutritionAccent(workout, index);
        const weeklyValues = weeklyWorkoutValues(dateKey, workout.id);
        return `
          <div class="nutrition-row" data-workout-id="${workout.id}" style="--card-accent:${accent};--nutrition-soft:${accent}14;--nutrition-faint:${accent}24">
            <div class="nutrition-percent" style="--progress:${progress}%"><span>${target > 0 ? `${Math.round(progress)}%` : "-"}</span></div>
            <div class="nutrition-row-main">
              <div class="nutrition-name">${workoutName(workout)}</div>
              <div class="nutrition-values">
                <span class="nutrition-num">${formatMetric(count, workout)}</span>
                <span class="nutrition-goal">${target > 0 ? `/ ${formatMetric(target, workout)} ${unit}` : unit}</span>
              </div>
            </div>
            ${buildNutritionTrend(weeklyValues, accent)}
            <button class="nutrition-record-button" type="button" data-action="set" data-workout-id="${workout.id}">
              <span>+</span>
              <strong>기록하기</strong>
            </button>
          </div>
        `;
      }).join("");
      card.innerHTML = `
        <div class="nutrition-group-head">
          <div class="nutrition-head-title">
            <div class="nutrition-head-icon">${logIcon("nutrition")}</div>
            <div>
              <h3>영양소 섭취 기록</h3>
              <p>항목별 기록 1회 완료 시 3점</p>
            </div>
          </div>
          <div class="section-actions">
            <button class="text-btn" type="button" id="openNutritionImport">가져오기</button>
            <button class="text-btn" type="button" id="openNutritionManage">항목 관리</button>
          </div>
        </div>
        <div class="nutrition-group-list">${rows}</div>
      `;
      card.querySelector("#openNutritionImport").addEventListener("click", openNutritionImport);
      card.querySelector("#openNutritionManage").addEventListener("click", openNutritionManage);
      card.querySelectorAll("button[data-action='set']").forEach((button) => {
        const workout = getWorkout(button.dataset.workoutId);
        button.addEventListener("click", () => handleCounterAction(workout, "set"));
      });
      targetGrid.append(card);
    }

    function handleCounterAction(workout, action, value) {
      if (!workout) return;
      const dateKey = todayKey();
      if (action === "inc") {
        const amount = Number(value);
        const before = getCount(dateKey, workout.id);
        const linked = workout.kind === "combo" ? [...(workout.components || [])] : [];
        linked.forEach((componentId) => {
          setCount(dateKey, componentId, getCount(dateKey, componentId) + amount, { silent: true });
        });
        state.lastActions.push({ dateKey, workoutId: workout.id, amount, linked });
        state.lastActions = state.lastActions.slice(-20);
        setCount(dateKey, workout.id, before + amount, { bump: workout.id });
      }
      if (action === "set") {
        els.countWorkoutId.value = workout.id;
        els.countDialogTitle.textContent = workoutName(workout);
        els.countValue.value = getCount(dateKey, workout.id);
        els.countValue.step = workout.kind === "body" || (workout.kind === "water" && workout.unit === "L") ? "0.1" : "1";
        els.countValue.placeholder = unitForWorkout(workout);
        els.countAddField.style.display = workout.kind === "nutrition" || workout.kind === "water" ? "grid" : "none";
        els.countAddValue.value = "";
        els.countAddValue.step = workout.kind === "nutrition" || (workout.kind === "water" && workout.unit === "L") ? "0.1" : "1";
        els.countAddValue.placeholder = unitForWorkout(workout);
        els.countDialog.showModal();
        setTimeout(() => els.countValue.select(), 50);
      }
      if (action === "undo") {
        const index = [...state.lastActions].reverse().findIndex((item) => {
          return item.dateKey === dateKey && item.workoutId === workout.id;
        });
        if (index === -1) {
          showToast(t("nothingUndo"));
          return;
        }
        const realIndex = state.lastActions.length - 1 - index;
        const actionItem = state.lastActions.splice(realIndex, 1)[0];
        (actionItem.linked || []).forEach((componentId) => {
          setCount(dateKey, componentId, getCount(dateKey, componentId) - actionItem.amount, { silent: true });
        });
        if (actionItem.waterBucket && state.waterLogs?.[dateKey]?.[workout.id]) {
          const nextMl = Math.max(0, Number(state.waterLogs[dateKey][workout.id][actionItem.waterBucket] || 0) - Number(actionItem.waterMl || 0));
          if (nextMl) {
            state.waterLogs[dateKey][workout.id][actionItem.waterBucket] = nextMl;
          } else {
            delete state.waterLogs[dateKey][workout.id][actionItem.waterBucket];
          }
        }
        setCount(dateKey, workout.id, getCount(dateKey, workout.id) - actionItem.amount, { bump: workout.id });
        showToast(t("undoDone"));
      }
      if (action === "edit") {
        openWorkoutDialog(workout);
      }
      if (action === "run") {
        openRunDialog(workout);
      }
    }

    function statsCatalog() {
      return state.workouts
        .filter((workout) => {
          return workout.kind === "body"
            || workout.kind === "water"
            || workout.kind === "nutrition"
            || workout.kind === "combo"
            || !workout.kind
            || workout.kind === "exercise";
        })
        .map((workout) => {
          const type = workout.kind === "body" ? "weight"
            : workout.kind === "water" ? "water"
              : workout.kind === "nutrition" ? "nutrition"
                : "workout";
          return {
            id: `${type}:${workout.id}`,
            workoutId: workout.id,
            type,
            title: type === "weight" ? "체중 기록"
              : type === "water" ? "수분 섭취"
                : type === "nutrition" ? `${workoutName(workout)} 섭취 기록`
                  : `${workoutName(workout)} 운동 기록`,
            subtitle: type === "weight" ? "월별 체중 변화"
              : type === "water" ? "월별 수분 섭취량"
                : type === "nutrition" ? "월별 영양소 섭취량"
                  : displayKind(workout),
            unit: type === "weight" ? "kg"
              : type === "water" ? "L"
                : type === "workout" ? "회"
                  : unitForWorkout(workout),
            workout
          };
        });
    }

    function ensureStatsSections() {
      const catalog = statsCatalog();
      const ids = new Set(catalog.map((item) => item.id));
      const existing = Array.isArray(state.statsSections) ? state.statsSections : [];
      state.statsSections = existing
        .filter((section) => ids.has(section.id))
        .map((section) => ({ id: section.id, enabled: section.enabled !== false }));
      catalog.forEach((item) => {
        if (!state.statsSections.some((section) => section.id === item.id)) {
          state.statsSections.push({ id: item.id, enabled: true });
        }
      });
    }

    function statSectionValue(definition, dateKey) {
      const workout = definition.workout;
      if (definition.type === "water") return Number((waterTotalMlForDate(dateKey, workout) / 1000).toFixed(2));
      return getCount(dateKey, workout.id);
    }

    function formatStatValue(value, definition) {
      if (!value) return "0";
      if (definition.type === "weight") return Number(value).toFixed(1).replace(/\.0$/, "");
      if (definition.type === "water") return Number(value).toFixed(2).replace(/0$/, "").replace(/\.0$/, "");
      return Number(value).toLocaleString();
    }

    function statSectionIcon(definition, index) {
      if (definition.type === "weight") return logIcon("body");
      if (definition.type === "water") return logIcon("water");
      if (definition.type === "nutrition") return logIcon("nutrition");
      return workoutIcon(workoutTheme(index).icon);
    }

    function renderStats() {
      const days = statsDays();
      ensureStatsSections();
      const catalog = new Map(statsCatalog().map((item) => [item.id, item]));
      const activeSections = state.statsSections
        .filter((section) => section.enabled !== false)
        .map((section) => catalog.get(section.id))
        .filter(Boolean);
      const monthLabel = formatMonthLabel(statsMonthKey);
      els.monthSwitcher.classList.add("show");
      els.statsMonthLabel.textContent = monthLabel;
      els.statsRangeLabel.textContent = `${monthLabel} 기록 통계`;

      els.statsWorkoutList.innerHTML = "";
      if (activeSections.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "통계 관리에서 표시할 섹션을 추가하세요.";
        els.statsWorkoutList.append(empty);
        return;
      }

      activeSections.forEach((definition, index) => {
        const values = days.map((dateKey) => ({ dateKey, value: statSectionValue(definition, dateKey) }));
        const total = values.reduce((sum, item) => sum + item.value, 0);
        const recordedDays = values.filter((item) => item.value > 0).length;
        const latestValue = values.filter((item) => item.value > 0).at(-1)?.value || 0;
        const theme = workoutTheme(index);
        const accent = definition.type === "weight" ? "#7c3aed"
          : definition.type === "water" ? "#2f7df6"
            : theme.accent;
        const displayValue = definition.type === "weight" ? latestValue : total;
        const card = document.createElement("article");
        card.className = `exercise-stat-card stat-section-card stat-${definition.type}`;
        card.style.setProperty("--card-accent", accent);
        card.style.setProperty("--bubble", `${accent}18`);
        card.innerHTML = `
          <div class="exercise-stat-head">
            <div class="exercise-stat-title">
              <div class="icon-bubble">${statSectionIcon(definition, index)}</div>
              <div>
                <h3>${definition.title}</h3>
                <p>${definition.subtitle}</p>
              </div>
            </div>
            <div class="exercise-stat-total">${formatStatValue(displayValue, definition)}<span>${definition.unit}</span></div>
          </div>
          ${buildStatBars(values)}
          <div class="stat-card-meta">
            <span class="meta-pill">${t("monthlyMode")}</span>
            <span class="meta-pill">${recordedDays}일 기록</span>
            <span class="meta-pill">${definition.type === "weight" ? "최근 기록" : "월 누적"}</span>
          </div>
        `;
        els.statsWorkoutList.append(card);
      });
      bindStatInteractions();
    }

    function statsDays() {
      const length = daysInMonth(statsMonthKey);
      return Array.from({ length }, (_, index) => `${statsMonthKey}-${String(index + 1).padStart(2, "0")}`);
    }

    function buildStatBars(values) {
      const max = Math.max(1, ...values.map((item) => item.value));
      const axis = values.map((item, index) => {
        if (index % 5 !== 0 && index !== values.length - 1) return "<span></span>";
        return `<span>${item.dateKey.slice(5).replace("-", "/")}</span>`;
      }).join("");
      return `
        <div class="stat-bars">
          <div class="stat-guide"></div>
          <div class="stat-tooltip"></div>
          ${values.map((item, index) => `<div class="stat-bar${item.dateKey === todayKey() ? " today" : ""}" data-index="${index}" data-date="${item.dateKey}" data-value="${item.value}" style="height:${Math.max(5, (item.value / max) * 100)}%" title="${item.dateKey}: ${item.value}"></div>`).join("")}
        </div>
        <div class="stat-axis">${axis}</div>
      `;
    }

    function bindStatInteractions() {
      document.querySelectorAll(".stat-bars").forEach((chart) => {
        const bars = [...chart.querySelectorAll(".stat-bar")];
        const guide = chart.querySelector(".stat-guide");
        const tooltip = chart.querySelector(".stat-tooltip");
        const selectBar = (bar) => {
          if (!bar) return;
          bars.forEach((item) => item.classList.toggle("is-selected", item === bar));
          const chartRect = chart.getBoundingClientRect();
          const barRect = bar.getBoundingClientRect();
          const x = barRect.left + barRect.width / 2 - chartRect.left;
          guide.style.left = `${x}px`;
          tooltip.style.left = `${Math.max(58, Math.min(chartRect.width - 58, x))}px`;
          tooltip.innerHTML = `${bar.dataset.date}<span>${Number(bar.dataset.value).toLocaleString()}</span>`;
          chart.classList.add("active");
        };
        bars.forEach((bar) => {
          bar.addEventListener("pointerenter", () => selectBar(bar));
          bar.addEventListener("focus", () => selectBar(bar));
        });
        chart.addEventListener("pointermove", (event) => {
          const chartRect = chart.getBoundingClientRect();
          const ratio = Math.max(0, Math.min(1, (event.clientX - chartRect.left) / Math.max(1, chartRect.width)));
          const index = Math.round(ratio * (bars.length - 1));
          selectBar(bars[index]);
        });
        chart.addEventListener("pointerleave", () => {
          chart.classList.remove("active");
          bars.forEach((bar) => bar.classList.remove("is-selected"));
        });
      });
    }

    function openStatsManage() {
      renderStatsManageList();
      els.statsManageDialog.showModal();
    }

    function renderStatsManageList() {
      ensureStatsSections();
      const catalog = new Map(statsCatalog().map((item) => [item.id, item]));
      els.statsManageList.innerHTML = state.statsSections.map((section, index) => {
        const definition = catalog.get(section.id);
        if (!definition) return "";
        return `
          <div class="widget-order-item stats-manage-item ${section.enabled === false ? "is-hidden" : ""}" data-stats-section-id="${section.id}">
            <div class="widget-order-name">
              <strong>${definition.title}</strong>
              <span>${definition.subtitle}</span>
            </div>
            <div class="widget-order-actions">
              <button class="order-button" type="button" data-stats-action="up" data-stats-id="${section.id}" ${index === 0 ? "disabled" : ""}>↑</button>
              <button class="order-button" type="button" data-stats-action="down" data-stats-id="${section.id}" ${index === state.statsSections.length - 1 ? "disabled" : ""}>↓</button>
              <button class="order-button stats-toggle-button" type="button" data-stats-action="toggle" data-stats-id="${section.id}">${section.enabled === false ? "+" : "−"}</button>
            </div>
          </div>
        `;
      }).join("");
      els.statsManageList.querySelectorAll("button").forEach((button) => {
        button.addEventListener("click", () => handleStatsManageAction(button.dataset.statsId, button.dataset.statsAction));
      });
    }

    function handleStatsManageAction(sectionId, action) {
      const index = state.statsSections.findIndex((section) => section.id === sectionId);
      if (index === -1) return;
      if (action === "toggle") {
        state.statsSections[index].enabled = state.statsSections[index].enabled === false;
      } else {
        const targetIndex = index + (action === "up" ? -1 : 1);
        if (targetIndex < 0 || targetIndex >= state.statsSections.length) return;
        const [item] = state.statsSections.splice(index, 1);
        state.statsSections.splice(targetIndex, 0, item);
      }
      saveState();
      renderStats();
      renderStatsManageList();
    }

    function render() {
      applyLanguage();
      renderTodayScore();
      renderCounters();
      renderStats();
    }

    function setPage(pageName) {
      els.pageButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.pageTarget === pageName);
      });

      setTimeout(() => els.workoutName.focus(), 50);
    }

    function renderWidgetOrderList() {
      const manageable = state.workouts.filter((workout) => !workout.kind || workout.kind === "exercise" || workout.kind === "combo");
      els.widgetOrderList.innerHTML = manageable.map((workout, index) => `
        <div class="widget-order-item" data-order-id="${workout.id}">
          <div class="widget-order-name">
            <strong>${workoutName(workout)}</strong>
            <span>${displayKind(workout)}</span>
          </div>
          <div class="widget-order-actions">
            <button class="order-button" type="button" data-order-action="up" data-order-id="${workout.id}" ${index === 0 ? "disabled" : ""}>↑</button>
            <button class="order-button" type="button" data-order-action="down" data-order-id="${workout.id}" ${index === manageable.length - 1 ? "disabled" : ""}>↓</button>
            <button class="order-button" type="button" data-order-action="edit" data-order-id="${workout.id}">편</button>
          </div>
        </div>
      `).join("");
      els.widgetOrderList.querySelectorAll("button").forEach((button) => {
        button.addEventListener("click", () => handleWidgetOrderAction(button.dataset.orderId, button.dataset.orderAction));
      });
    }

    function handleWidgetOrderAction(workoutId, action) {
      const index = state.workouts.findIndex((workout) => workout.id === workoutId);
      if (index === -1) return;
      const workout = state.workouts[index];
      if (workout.kind && workout.kind !== "exercise" && workout.kind !== "combo") return;
      if (action === "edit") {
        openWorkoutDialog(workout);
        return;
      }
      const direction = action === "up" ? -1 : 1;
      let targetIndex = index + direction;
      while (targetIndex >= 0 && targetIndex < state.workouts.length) {
        const target = state.workouts[targetIndex];
        if (!target.kind || target.kind === "exercise" || target.kind === "combo") break;
        targetIndex += direction;
      }
      if (targetIndex < 0 || targetIndex >= state.workouts.length) return;
      const [item] = state.workouts.splice(index, 1);
      state.workouts.splice(targetIndex, 0, item);
      saveState();
      render();
      renderWidgetOrderList();
      showToast("위젯 순서를 바꿨습니다.");
    }

    function renderComboList(workout = null) {
      const selected = new Set(workout?.components || []);
      els.comboList.innerHTML = baseExercises().map((item) => {
        if (workout && item.id === workout.id) return "";
        return `
          <label class="check-pill">
            <input type="checkbox" value="${item.id}" ${selected.has(item.id) ? "checked" : ""}>
            <span>${workoutName(item)}</span>
          </label>
        `;
      }).join("");
    }

    function updateWidgetKindFields() {
      const isCombo = els.widgetKind.value === "combo";
      els.comboField.style.display = isCombo ? "grid" : "none";
      document.querySelectorAll(".exercise-settings").forEach((field) => {
        field.style.display = "none";
      });
    }

    function openNutritionManage() {
      renderNutritionManageList();
      els.newNutritionName.value = "";
      els.newNutritionUnit.value = "";
      els.nutritionManageDialog.showModal();
    }

    function renderNutritionManageList() {
      const items = state.workouts.filter((workout) => workout.kind === "nutrition");
      els.nutritionManageList.innerHTML = items.length ? items.map((workout, index) => {
        const theme = workoutTheme(index + 1);
        return `
          <div class="manage-item" data-workout-id="${workout.id}" style="--card-accent:${theme.accent}">
            <div class="manage-row">
              <span class="manage-dot"></span>
              <span class="manage-name">${workoutName(workout)}</span>
              <span class="manage-unit">${unitForWorkout(workout)}</span>
              <button class="manage-delete" type="button" data-action="delete" data-workout-id="${workout.id}">×</button>
            </div>
            <div class="goal-row">
              <span>일일 목표</span>
              <input class="number-input" type="number" min="0" step="0.1" value="${workout.target || ""}" placeholder="미설정" data-action="goal" data-workout-id="${workout.id}">
              <span>${unitForWorkout(workout)}</span>
            </div>
          </div>
        `;
      }).join("") : `<p class="empty">영양소 항목이 없습니다.</p>`;
      els.nutritionManageList.querySelectorAll("[data-action='goal']").forEach((input) => {
        input.addEventListener("change", () => {
          const workout = getWorkout(input.dataset.workoutId);
          if (!workout) return;
          workout.target = input.value === "" ? 0 : Math.max(0, Number(input.value) || 0);
          saveState();
          render();
        });
      });
      els.nutritionManageList.querySelectorAll("[data-action='delete']").forEach((button) => {
        button.addEventListener("click", () => deleteNutritionType(button.dataset.workoutId));
      });
    }

    function addNutritionType() {
      const name = els.newNutritionName.value.trim();
      if (!name) {
        els.newNutritionName.focus();
        return;
      }
      state.workouts.push({
        id: crypto.randomUUID(),
        kind: "nutrition",
        name,
        target: 0,
        unit: els.newNutritionUnit.value.trim() || inferNutritionUnit(name)
      });
      saveState();
      els.newNutritionName.value = "";
      els.newNutritionUnit.value = "";
      renderNutritionManageList();
      render();
    }

    function deleteNutritionType(workoutId) {
      state.workouts = state.workouts.filter((workout) => workout.id !== workoutId);
      Object.keys(state.records).forEach((dateKey) => {
        delete state.records[dateKey][workoutId];
        if (Object.keys(state.records[dateKey]).length === 0) delete state.records[dateKey];
      });
      state.lastActions = state.lastActions.filter((item) => item.workoutId !== workoutId);
      saveState();
      renderNutritionManageList();
      render();
    }

    function openNutritionImport() {
      els.nutritionImportText.value = "";
      els.nutritionImportResult.textContent = "";
      els.nutritionImportDialog.showModal();
      setTimeout(() => els.nutritionImportText.focus(), 50);
    }

    function importNutritionText(text) {
      const lines = text.split("\n");
      const matched = [];
      lines.forEach((line) => {
        const match = line.match(/^(.+?)[\s:：]+([0-9]+\.?[0-9]*)/);
        if (!match) return;
        const rawName = match[1].trim();
        const value = Number(match[2]);
        if (!Number.isFinite(value) || value < 0) return;
        const workout = state.workouts.find((item) => {
          if (item.kind !== "nutrition") return false;
          const name = workoutName(item);
          return name === rawName || name.includes(rawName) || rawName.includes(name);
        });
        if (!workout) return;
        setCount(todayKey(), workout.id, value, { silent: true });
        matched.push(`${workoutName(workout)} ${value}${unitForWorkout(workout)}`);
      });
      saveState();
      render();
      return matched;
    }

    function openWeightManage() {
      const body = state.workouts.find((workout) => workout.kind === "body");
      els.weightGoalInput.value = body?.target || "";
      els.weightManageDialog.showModal();
      setTimeout(() => els.weightGoalInput.select(), 50);
    }

    function openWaterManage() {
      const water = state.workouts.find((workout) => workout.kind === "water");
      if (!water) return;
      els.waterGoalInput.value = formatLiters(waterGoalMl(water));
      if (els.waterCupInput) els.waterCupInput.value = water.cupMl || 20;
      updateWaterManageFields();
      els.waterManageDialog.showModal();
      setTimeout(() => els.waterGoalInput.select(), 50);
    }

    function updateWaterManageFields() {
      if (els.waterUnitField) els.waterUnitField.style.display = "none";
      if (els.waterCupField) els.waterCupField.style.display = "grid";
      els.waterGoalLabel.textContent = "목표 섭취량";
      els.waterGoalInput.placeholder = "2.0";
      els.waterGoalInput.step = "0.1";
      if (els.waterManageNote) els.waterManageNote.textContent = "";
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => els.toast.classList.remove("show"), 1800);
    }

    function openRunDialog(workout) {
      if (workout.kind === "nutrition" || workout.kind === "body") {
        showToast("운동 위젯에서 실행할 수 있어요.");
        return;
      }
      stopRun(false);
      runSession.workout = workout;
      runSession.reps = 10;
      runSession.tempo = Math.max(1, Number(workout.secondsPerRep) || 3);
      runSession.completed = 0;
      runSession.tick = runSession.tempo;
      runSession.phase = "ready";
      els.runWorkoutId.value = workout.id;
      els.runDialogTitle.textContent = workoutName(workout);
      els.runReps.value = runSession.reps;
      els.runTempo.value = runSession.tempo;
      updateRunDisplay("준비", runSession.tempo);
      els.startRun.textContent = "시작";
      els.startRun.disabled = false;
      els.runReps.disabled = false;
      els.runTempo.disabled = false;
      els.runDialog.showModal();
    }

    function updateRunDisplay(label, number = runSession.tick) {
      const reps = Math.max(1, Number(els.runReps.value) || runSession.reps);
      const tempo = Math.max(1, Number(els.runTempo.value) || runSession.tempo);
      els.runCountNumber.textContent = `${runSession.completed}/${reps}`;
      els.runSecondNumber.textContent = number;
      els.runLabel.textContent = label;
      els.runProgressText.textContent = `${runSession.completed} / ${reps}`;
      els.runTempoText.textContent = `${tempo}초 템포`;
    }

    function ensureAudio() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return null;
      if (!runSession.audio) runSession.audio = new AudioContext();
      if (runSession.audio.state === "suspended") runSession.audio.resume();
      return runSession.audio;
    }

    function playTone(type = "tick") {
      const audio = ensureAudio();
      if (!audio) return;
      const oscillator = audio.createOscillator();
      const gain = audio.createGain();
      const settings = {
        tick: { frequency: 520, peak: 0.12, duration: 0.14 },
        rep: { frequency: 760, peak: 0.16, duration: 0.2 },
        done: { frequency: 940, peak: 0.2, duration: 0.34 }
      }[type] || { frequency: 520, peak: 0.12, duration: 0.14 };
      oscillator.type = "sine";
      oscillator.frequency.value = settings.frequency;
      gain.gain.setValueAtTime(0.001, audio.currentTime);
      gain.gain.exponentialRampToValueAtTime(settings.peak, audio.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + settings.duration);
      oscillator.connect(gain);
      gain.connect(audio.destination);
      oscillator.start();
      oscillator.stop(audio.currentTime + settings.duration + 0.02);
    }

    function startRunCountdown() {
      if (!runSession.workout || runSession.running) return;
      runSession.reps = Math.max(1, Math.min(300, Number(els.runReps.value) || 10));
      runSession.tempo = Math.max(1, Math.min(30, Number(els.runTempo.value) || 3));
      runSession.completed = 0;
      runSession.tick = runSession.tempo;
      runSession.phase = "work";
      runSession.running = true;
      els.startRun.textContent = "진행중";
      els.startRun.disabled = true;
      els.runReps.disabled = true;
      els.runTempo.disabled = true;
      updateRunDisplay("호흡 맞추기", runSession.tick);
      playTone("tick");
      runSession.timer = setInterval(stepRunCountdown, 1000);
    }

    function stepRunCountdown() {
      if (!runSession.running) return;
      if (runSession.phase === "rest") {
        if (runSession.completed >= runSession.reps) {
          updateRunDisplay("완료", "OK");
          playTone("done");
          finishRunCountdown();
          return;
        }
        runSession.phase = "work";
        runSession.tick = runSession.tempo;
        updateRunDisplay("다음 시작", runSession.tick);
        playTone("tick");
        return;
      }
      runSession.tick -= 1;
      if (runSession.tick > 0) {
        updateRunDisplay("호흡 맞추기", runSession.tick);
        playTone("tick");
        return;
      }
      runSession.completed += 1;
      runSession.phase = "rest";
      runSession.tick = 1;
      updateRunDisplay(runSession.completed >= runSession.reps ? "완료 준비" : "1회 완료", 1);
      playTone("rep");
    }

    function finishRunCountdown() {
      const workout = runSession.workout;
      const reps = runSession.reps;
      stopRun(false);
      if (workout && reps > 0) {
        handleCounterAction(workout, "inc", reps);
        showToast(`${workoutName(workout)} ${reps}회 추가했습니다.`);
      }
      els.startRun.disabled = false;
      els.startRun.textContent = "시작";
      els.runReps.disabled = false;
      els.runTempo.disabled = false;
      setTimeout(() => {
        if (els.runDialog.open) els.runDialog.close();
      }, 650);
    }

    function stopRun(resetButtons = true) {
      if (runSession.timer) clearInterval(runSession.timer);
      runSession.timer = null;
      runSession.running = false;
      runSession.phase = "ready";
      if (resetButtons && els.startRun) {
        els.startRun.disabled = false;
        els.startRun.textContent = "시작";
        els.runReps.disabled = false;
        els.runTempo.disabled = false;
      }
    }

    els.profileButton.addEventListener("click", () => setPage("me"));

    els.pageButtons.forEach((button) => {
      button.addEventListener("click", () => setPage(button.dataset.pageTarget));
    });

    els.statsModeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        statsMode = "calendarMonth";
        renderStats();
      });
    });
    if (els.openStatsManage) els.openStatsManage.addEventListener("click", openStatsManage);
    if (els.closeStatsManage) els.closeStatsManage.addEventListener("click", () => els.statsManageDialog.close());
    els.prevStatsMonth.addEventListener("click", () => {
      statsMonthKey = addMonths(statsMonthKey, -1);
      renderStats();
    });
    els.nextStatsMonth.addEventListener("click", () => {
      statsMonthKey = addMonths(statsMonthKey, 1);
      renderStats();
    });

    els.profileForm.addEventListener("submit", (event) => {
      event.preventDefault();
      state.profile.nickname = els.nickname.value.trim();
      state.profile.language = els.language.value;
      state.profile.age = els.age.value;
      state.profile.sex = els.sex.value;
      state.profile.heightCm = els.heightCm.value;
      state.profile.weightKg = els.weightKg.value;
      saveState();
      render();
      showToast(t("saved"));
    });

    els.addWorkoutButton.addEventListener("click", () => openWorkoutDialog());
    els.addWorkoutButtonWorkout.addEventListener("click", () => openWorkoutDialog());
    els.closeWorkout.addEventListener("click", () => els.workoutDialog.close());
    els.widgetKind.addEventListener("change", updateWidgetKindFields);
    els.closeNutritionManage.addEventListener("click", () => els.nutritionManageDialog.close());
    els.addNutritionType.addEventListener("click", () => {
      addNutritionType();
      showToast(t("saved"));
    });
    els.closeNutritionImport.addEventListener("click", () => els.nutritionImportDialog.close());
    els.nutritionImportForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const matched = importNutritionText(els.nutritionImportText.value);
      if (!matched.length) {
        els.nutritionImportResult.textContent = "가져올 수 있는 영양소를 찾지 못했습니다.";
        return;
      }
      els.nutritionImportResult.textContent = `${matched.join(", ")} 기록 완료`;
      showToast("영양소를 가져왔습니다.");
      setTimeout(() => {
        if (els.nutritionImportDialog.open) els.nutritionImportDialog.close();
      }, 650);
    });
    els.closeWeightManage.addEventListener("click", () => els.weightManageDialog.close());
    els.weightManageForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const body = state.workouts.find((workout) => workout.kind === "body");
      if (!body) return;
      body.target = els.weightGoalInput.value === "" ? 0 : Math.max(0, Number(els.weightGoalInput.value) || 0);
      saveState();
      els.weightManageDialog.close();
      render();
      showToast(t("saved"));
    });
    els.closeWaterManage.addEventListener("click", () => els.waterManageDialog.close());
    if (els.waterMode) els.waterMode.addEventListener("change", updateWaterManageFields);
    if (els.waterUnit) els.waterUnit.addEventListener("change", updateWaterManageFields);
    els.waterManageForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const water = state.workouts.find((workout) => workout.kind === "water");
      if (!water) return;
      water.mode = "count";
      water.unit = "회";
      const liters = Math.max(0, Number(els.waterGoalInput.value) || 0);
      water.targetMl = liters > 0 ? Math.round(liters * 1000) : 2000;
      water.cupMl = Math.max(1, Number(els.waterCupInput?.value) || 20);
      water.sipConfigured = true;
      water.target = Math.max(1, Math.round(water.targetMl / water.cupMl));
      saveState();
      els.waterManageDialog.close();
      render();
      showToast(t("saved"));
    });
    els.startRun.addEventListener("click", startRunCountdown);
    els.closeRun.addEventListener("click", () => {
      stopRun();
      els.runDialog.close();
    });
    els.runDialog.addEventListener("close", () => stopRun());
    [els.runReps, els.runTempo].forEach((input) => {
      input.addEventListener("input", () => {
        if (runSession.running) return;
        runSession.reps = Math.max(1, Number(els.runReps.value) || 10);
        runSession.tempo = Math.max(1, Number(els.runTempo.value) || 3);
        runSession.tick = runSession.tempo;
        runSession.phase = "ready";
        updateRunDisplay("준비", runSession.tempo);
      });
    });

    els.workoutForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const id = els.editingWorkoutId.value;
      const name = els.workoutName.value.trim();
      const target = Math.max(0, Number(els.workoutTarget.value) || 0);
      const kind = els.widgetKind.value;
      const components = [...els.comboList.querySelectorAll("input:checked")].map((input) => input.value);
      if (!name) return;
      if (kind === "combo" && components.length === 0) {
        showToast("조합할 운동을 선택하세요.");
        return;
      }
      if (id) {
        const workout = state.workouts.find((item) => item.id === id);
        if (workout) {
          delete workout.nameKey;
          workout.name = name;
          workout.target = target;
          workout.kind = kind;
          workout.met = Math.max(1, Number(els.workoutMet.value) || 4);
          workout.secondsPerRep = Math.max(1, Number(els.secondsPerRep.value) || 3);
          workout.components = kind === "combo" ? components : [];
        }
      } else {
        state.workouts.push({
          id: crypto.randomUUID(),
          kind,
          name,
          target,
          met: Math.max(1, Number(els.workoutMet.value) || 4),
          secondsPerRep: Math.max(1, Number(els.secondsPerRep.value) || 3),
          components: kind === "combo" ? components : []
        });
      }
      saveState();
      els.workoutDialog.close();
      render();
      showToast(t("saved"));
    });

    els.deleteWorkoutButton.addEventListener("click", () => {
      const id = els.editingWorkoutId.value;
      state.workouts = state.workouts.filter((workout) => workout.id !== id);
      Object.keys(state.records).forEach((dateKey) => {
        delete state.records[dateKey][id];
        if (Object.keys(state.records[dateKey]).length === 0) delete state.records[dateKey];
      });
      state.lastActions = state.lastActions.filter((item) => item.workoutId !== id);
      saveState();
      els.workoutDialog.close();
      render();
      showToast(t("deleted"));
    });

    els.closeCount.addEventListener("click", () => els.countDialog.close());

    els.countForm.addEventListener("submit", (event) => {
      event.preventDefault();
      setCount(todayKey(), els.countWorkoutId.value, els.countValue.value, { bump: els.countWorkoutId.value });
      els.countDialog.close();
      showToast(t("saved"));
    });

    els.addCountValue.addEventListener("click", () => {
      const workoutId = els.countWorkoutId.value;
      const amount = Number(els.countAddValue.value) || 0;
      if (amount <= 0) return;
      const nextValue = getCount(todayKey(), workoutId) + amount;
      setCount(todayKey(), workoutId, nextValue, { bump: workoutId });
      els.countValue.value = nextValue;
      els.countAddValue.value = "";
      showToast(t("saved"));
    });

    if (els.exportButton) {
      els.exportButton.addEventListener("click", async () => {
        const payload = JSON.stringify({ exportedAt: new Date().toISOString(), ...state }, null, 2);
        try {
          await navigator.clipboard.writeText(payload);
          showToast(t("exported"));
        } catch {
          const blob = new Blob([payload], { type: "application/json" });
          const link = document.createElement("a");
          link.href = URL.createObjectURL(blob);
          link.download = "daily-rep-counter.json";
          link.click();
          URL.revokeObjectURL(link.href);
        }
      });
    }

    seedPreviewData();
    render();
  </script>
</body>
</html>
