<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily Rep Counter</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eeeeec;
      --panel: #ffffff;
      --panel-soft: #f1f1ee;
      --ink: #111111;
      --muted: #757575;
      --line: #e7e5df;
      --accent: #fc4c02;
      --accent-2: #111111;
      --accent-3: #7c3aed;
      --accent-4: #2374ff;
      --gold: #f5b301;
      --good: #16a06d;
      --shadow: 0 26px 60px rgba(17, 17, 17, 0.12);
      --shadow-soft: 0 14px 34px rgba(17, 17, 17, 0.08);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    body::before {
      content: none;
      position: fixed;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(17, 17, 17, 0.03), transparent 30%, transparent 70%, rgba(17, 17, 17, 0.03));
      pointer-events: none;
      z-index: -1;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease, background 120ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    button:active {
      transform: scale(0.96);
      filter: brightness(0.96);
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
      padding: 30px 20px 112px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 0 8px 18px;
      min-height: 88px;
      margin-bottom: 8px;
      color: var(--ink);
      background: transparent;
      border-radius: var(--radius);
      box-shadow: none;
      overflow: visible;
      position: relative;
      border: 0;
    }

    .topbar::after {
      content: none;
    }

    .topbar::before {
      content: none;
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      display: none;
    }

    .brand p {
      margin: 0;
      color: var(--ink);
      font-size: clamp(25px, 4.6vw, 38px);
      line-height: 1.12;
      font-weight: 900;
      letter-spacing: 0;
      position: relative;
      z-index: 1;
    }

    .date-line {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding: 0;
      border: 0;
      border-radius: var(--radius);
      background: transparent;
      color: #343840;
      font-size: 14px;
      font-weight: 800;
      box-shadow: none;
      position: relative;
      z-index: 1;
    }

    .score-line {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      min-height: 34px;
      padding: 0 13px;
      border-radius: 999px;
      background: #fff;
      color: var(--ink);
      box-shadow: 0 12px 26px rgba(17, 17, 17, 0.08);
      font-size: 14px;
      font-weight: 900;
      position: relative;
      z-index: 1;
    }

    .score-line span {
      color: var(--accent);
    }

    .score-note {
      margin-top: 7px;
      color: #777;
      font-size: 12px;
      line-height: 1.35;
      font-weight: 750;
      position: relative;
      z-index: 1;
    }

    .score-chart {
      grid-column: 1 / -1;
      height: 54px;
      margin-top: -2px;
      padding: 0 14px 10px;
      border-radius: 0 0 28px 28px;
      background: #1c1c1a;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-top: 0;
      position: relative;
      z-index: 1;
    }

    .mini-line {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    .mini-line .area {
      fill: rgba(112, 227, 160, 0.08);
    }

    .mini-line .line {
      fill: none;
      stroke: var(--good);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .mini-line .dot {
      fill: var(--good);
      stroke: #1c1c1a;
      stroke-width: 2;
    }

    .profile-button {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid #e9e8e3;
      color: var(--ink);
      outline: 5px solid rgba(255, 255, 255, 0.82);
      display: grid;
      place-items: center;
      font-weight: 800;
      box-shadow: 0 16px 32px rgba(17, 17, 17, 0.12);
      flex: 0 0 auto;
      position: relative;
      z-index: 1;
    }

    .page-nav {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 20;
      width: min(560px, calc(100vw - 28px));
      transform: translateX(-50%);
      margin-bottom: 0;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid #e8e6df;
      border-radius: var(--radius);
      padding: 6px;
      box-shadow: 0 18px 44px rgba(17, 17, 17, 0.14);
      backdrop-filter: blur(18px);
    }

    .nav-button {
      height: 44px;
      border-radius: 6px;
      background: transparent;
      color: #525760;
      font-weight: 850;
    }

    .nav-button.active {
      background: var(--ink);
      color: #fff;
      box-shadow: 0 12px 26px rgba(24, 25, 29, 0.2);
    }

    .page {
      display: none;
    }

    .page.active {
      display: grid;
      gap: 16px;
    }

    .surface,
    .sheet {
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
    }

    .surface {
      padding: 0;
      position: relative;
      overflow: visible;
    }

    .surface::before,
    .sheet::before {
      content: none;
    }

    .surface > *,
    .sheet > * {
      position: relative;
      z-index: 1;
    }

    .profile-surface {
      max-width: 620px;
      margin: 0 auto;
      width: 100%;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .toolbar h2,
    .sheet h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .toolbar-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .date-input,
    .text-input,
    .number-input,
    .select-input {
      height: 40px;
      border: 1px solid #ece9e3;
      background: rgba(255, 255, 255, 0.86);
      color: var(--ink);
      border-radius: var(--radius);
      padding: 0 11px;
      min-width: 0;
    }

    .date-input {
      width: 150px;
    }

    .icon-button,
    .primary-button,
    .quiet-button,
    .danger-button,
    .chip-button {
      height: 38px;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-width: 40px;
      padding: 0 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .primary-button,
    .quiet-button,
    .danger-button,
    .chip-button,
    .icon-button,
    .nav-button,
    .profile-button {
      will-change: transform;
    }

    .primary-button:hover,
    .quiet-button:hover,
    .danger-button:hover,
    .chip-button:hover,
    .icon-button:hover {
      box-shadow: 0 8px 18px rgba(22, 26, 32, 0.1);
      transform: translateY(-1px);
    }

    .icon-button {
      width: 40px;
      padding: 0;
      background: #fff;
      color: var(--ink);
      border: 1px solid #efeee9;
      box-shadow: var(--shadow-soft);
    }

    .primary-button {
      background: var(--ink);
      color: #fff;
      box-shadow: 0 14px 26px rgba(17, 17, 17, 0.18);
    }

    .quiet-button,
    .chip-button {
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
      border: 1px solid #efeee9;
    }

    .danger-button {
      background: #fff0ee;
      color: #9a2d23;
      border: 1px solid #efc0b9;
    }

    .workout-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    #page-today .toolbar {
      display: none;
    }

    .exercise-group-card {
      grid-column: 1 / -1;
      display: grid;
      gap: 16px;
      padding: 18px;
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 42%),
        #191918;
      border: 1px solid rgba(255, 255, 255, 0.09);
      box-shadow: var(--shadow-soft);
    }

    .exercise-group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .exercise-group-head h3 {
      margin: 0;
      font-size: 21px;
      font-weight: 900;
    }

    .exercise-group-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .exercise-group-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .counter-card {
      background:
        linear-gradient(180deg, #fff, #fbfbf8);
      border: 1px solid #ebe9e2;
      border-radius: var(--radius);
      padding: 13px;
      min-height: 214px;
      display: grid;
      gap: 9px;
      box-shadow: 0 14px 30px rgba(17, 17, 17, 0.07);
      position: relative;
      overflow: hidden;
    }

    .counter-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 4px;
      background: var(--accent);
      box-shadow: none;
    }

    .counter-card::after {
      content: none;
    }

    .counter-card.bump .count {
      animation: count-pop 260ms ease;
    }

    .card-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 6px;
      min-width: 0;
    }

    .card-title {
      min-width: 0;
    }

    .card-title h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .card-title p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 11px;
    }

    .count-row {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      padding-top: 2px;
    }

    .count {
      font-size: clamp(34px, 8vw, 48px);
      line-height: 1;
      font-weight: 900;
      color: #20242b;
      letter-spacing: 0;
      text-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
    }

    .target-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 48px;
      height: 25px;
      padding: 0 8px;
      border-radius: 999px;
      background: #f5f5f2;
      color: var(--accent);
      box-shadow: none;
      font-size: 11px;
      font-weight: 850;
    }

    .progress-track {
      height: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: #edeae5;
    }

    .progress-fill {
      width: min(100%, var(--progress, 0%));
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      transition: width 220ms ease;
      box-shadow: none;
    }

    .sparkline-panel {
      display: grid;
      grid-template-columns: 1fr;
      gap: 3px;
      align-items: center;
      min-height: 52px;
      padding: 0;
    }

    .sparkline {
      width: 100%;
      height: 42px;
      overflow: visible;
    }

    .sparkline path.area {
      fill: rgba(245, 179, 1, 0.14);
    }

    .sparkline path.line {
      fill: none;
      stroke: var(--gold);
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 7px 10px rgba(240, 182, 29, 0.18));
    }

    .sparkline circle {
      fill: #18191d;
      stroke: #fff;
      stroke-width: 3;
      filter: drop-shadow(0 8px 10px rgba(24, 25, 29, 0.16));
    }

    .sparkline-days {
      display: none;
      justify-content: space-between;
      margin-top: -5px;
      color: #9a958d;
      font-size: 10px;
      font-weight: 800;
    }

    .sparkline-total {
      display: none;
    }

    @keyframes count-pop {
      0% {
        transform: scale(1);
      }
      45% {
        transform: scale(1.15);
        color: var(--accent-2);
      }
      100% {
        transform: scale(1);
      }
    }

    .quick-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .quick-row button {
      height: 36px;
      border-radius: var(--radius);
      color: #fff;
      font-weight: 900;
      letter-spacing: 0;
      font-size: 13px;
    }

    .quick-row button:nth-child(1) {
      background: var(--accent);
    }

    .quick-row button:nth-child(2) {
      background: var(--accent-3);
    }

    .quick-row button:nth-child(3) {
      background: var(--ink);
    }

    .card-tools {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .chip-button {
      height: 32px;
      min-width: 0;
      padding: 0 9px;
      font-size: 12px;
    }

    .sheet {
      padding: 0;
      display: grid;
      gap: 18px;
      position: relative;
      overflow: visible;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .stats-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .stats-top p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 850;
    }

    .period-toggle {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 6px;
      border-radius: 24px;
      background: #fff;
      border: 1px solid #e8e6df;
      box-shadow: 0 12px 28px rgba(17, 17, 17, 0.08);
      min-width: 260px;
    }

    .period-toggle button {
      height: 36px;
      border-radius: 18px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .period-toggle button.active {
      background: var(--ink);
      color: #fff;
    }

    .month-switcher {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 52px;
      padding: 6px;
      border-radius: 26px;
      background: #fff;
      border: 1px solid #e8e6df;
      box-shadow: 0 12px 28px rgba(17, 17, 17, 0.08);
    }

    .month-switcher.show {
      display: flex;
    }

    .month-switcher button {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #f4f4f2;
      color: var(--ink);
      font-size: 24px;
      font-weight: 900;
    }

    .month-switcher strong {
      font-size: 16px;
      font-weight: 900;
    }

    .stat {
      background:
        linear-gradient(180deg, #fff, #fbfbf8);
      border: 1px solid #ebe9e2;
      border-radius: var(--radius);
      padding: 15px;
      min-height: 96px;
      box-shadow: var(--shadow-soft);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .stat strong {
      display: block;
      margin-top: 8px;
      font-size: 31px;
      line-height: 1;
    }

    .stats-workout-list {
      display: grid;
      gap: 14px;
    }

    .exercise-stat-card {
      padding: 18px;
      border-radius: 26px;
      background: #fff;
      box-shadow: 0 18px 42px rgba(17, 17, 17, 0.08);
      border: 1px solid rgba(17, 17, 17, 0.04);
      display: grid;
      gap: 16px;
    }

    .exercise-stat-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .exercise-stat-title {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .exercise-stat-title .icon-bubble {
      width: 52px;
      height: 52px;
      flex: 0 0 auto;
    }

    .exercise-stat-title .icon-bubble svg {
      width: 28px;
      height: 28px;
    }

    .exercise-stat-title h3 {
      margin: 0;
      font-size: 21px;
      font-weight: 900;
      line-height: 1.08;
    }

    .exercise-stat-title p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .exercise-stat-total {
      text-align: right;
      font-size: 28px;
      line-height: 1;
      font-weight: 900;
      color: var(--card-accent, var(--accent));
    }

    .exercise-stat-total span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }

    .stat-bars {
      height: 128px;
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 1fr;
      gap: 5px;
      align-items: end;
      padding-top: 12px;
      position: relative;
      touch-action: pan-y;
      user-select: none;
    }

    .stat-bar {
      min-width: 0;
      min-height: 5px;
      border-radius: 999px 999px 4px 4px;
      background: color-mix(in srgb, var(--card-accent, var(--accent)) 78%, #fff);
      opacity: 0.92;
      position: relative;
    }

    .stat-bar.is-selected {
      opacity: 1;
      outline: 2px solid var(--ink);
      outline-offset: 2px;
    }

    .stat-bar.today {
      background: var(--ink);
    }

    .stat-axis {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 1fr;
      gap: 5px;
      color: #8a8780;
      font-size: 10px;
      font-weight: 800;
      text-align: center;
    }

    .stat-axis span {
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
    }

    .stat-card-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .stat-guide {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 0;
      border-left: 2px dashed rgba(17, 17, 17, 0.42);
      pointer-events: none;
      opacity: 0;
      transform: translateX(-1px);
    }

    .stat-bars.active .stat-guide {
      opacity: 1;
    }

    .stat-tooltip {
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translate(-50%, -100%);
      min-width: 112px;
      padding: 8px 10px;
      border-radius: 14px;
      background: var(--ink);
      color: #fff;
      text-align: center;
      font-size: 12px;
      line-height: 1.25;
      font-weight: 850;
      box-shadow: 0 12px 24px rgba(17, 17, 17, 0.22);
      pointer-events: none;
      opacity: 0;
      white-space: nowrap;
      z-index: 2;
    }

    .stat-bars.active .stat-tooltip {
      opacity: 1;
    }

    .stat-tooltip span {
      display: block;
      margin-top: 3px;
      color: #ffd9cc;
      font-weight: 900;
    }

    .chart {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      align-items: end;
      height: 180px;
      padding-top: 8px;
      padding-inline: 2px;
    }

    .bar-wrap {
      display: grid;
      grid-template-rows: 1fr auto;
      height: 100%;
      gap: 6px;
      min-width: 0;
    }

    .bar {
      align-self: end;
      border-radius: 6px 6px 2px 2px;
      background: linear-gradient(180deg, var(--accent), #ff8e63);
      min-height: 4px;
      position: relative;
      box-shadow: inset 0 -8px 16px rgba(0, 0, 0, 0.08);
    }

    .bar.today {
      background: linear-gradient(180deg, var(--ink), var(--accent));
    }

    .bar-label {
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history {
      display: grid;
      gap: 8px;
      max-height: 320px;
      overflow: auto;
      padding-right: 4px;
    }

    .history-row {
      display: grid;
      grid-template-columns: 92px 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 10px;
      border: 1px solid #ebe9e2;
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow-soft);
    }

    .history-date {
      font-weight: 850;
      font-size: 13px;
    }

    .history-items {
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-total {
      font-weight: 900;
      color: var(--accent);
    }

    .empty {
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 26px 12px;
      background: rgba(255, 255, 255, 0.8);
    }

    dialog {
      width: min(480px, calc(100vw - 28px));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 0;
    }

    dialog::backdrop {
      background: rgba(20, 24, 29, 0.36);
    }

    .modal {
      padding: 20px;
      display: grid;
      gap: 14px;
    }

    .modal h2 {
      margin: 0;
      font-size: 20px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .exercise-settings {
      display: none !important;
    }

    .field label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .inline-add-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .inline-add-row .quiet-button {
      height: 40px;
      border-radius: 20px;
      padding: 0 16px;
      font-weight: 900;
    }

    .textarea-input {
      min-height: 132px;
      padding: 13px;
      resize: vertical;
      line-height: 1.45;
    }

    .add-section {
      display: grid;
      gap: 10px;
      padding: 12px;
      border-radius: 18px;
      background: #242421;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .add-section h3 {
      margin: 0;
      font-size: 14px;
      font-weight: 900;
    }

    .manage-list {
      display: grid;
      gap: 10px;
    }

    .manage-item {
      display: grid;
      gap: 9px;
      padding: 12px;
      border-radius: 18px;
      background: #242421;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .manage-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: center;
    }

    .manage-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--card-accent, var(--accent));
    }

    .manage-name {
      font-size: 15px;
      font-weight: 900;
    }

    .manage-unit {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .manage-delete {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #2a1815;
      color: #ff9b88;
      font-weight: 900;
    }

    .goal-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }

    .goal-row input {
      height: 34px;
      min-width: 0;
    }

    .check-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .check-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      min-height: 38px;
      padding: 8px 10px;
      border-radius: var(--radius);
      background: #f7f7f5;
      border: 1px solid #efeee9;
      font-size: 13px;
      font-weight: 800;
    }

    .widget-manager {
      display: grid;
      gap: 10px;
      padding: 12px;
      border-radius: 18px;
      background: #f4f4f2;
    }

    .widget-manager h3 {
      margin: 0;
      font-size: 15px;
      font-weight: 900;
    }

    .widget-order-list {
      display: grid;
      gap: 8px;
    }

    .widget-order-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      min-height: 48px;
      padding: 9px 10px;
      border-radius: 14px;
      background: #fff;
      border: 1px solid #ecebe6;
    }

    .widget-order-name {
      min-width: 0;
    }

    .widget-order-name strong {
      display: block;
      font-size: 14px;
      line-height: 1.1;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .widget-order-name span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .widget-order-actions {
      display: flex;
      gap: 6px;
    }

    .order-button {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #f4f4f2;
      color: var(--ink);
      font-size: 13px;
      font-weight: 900;
    }

    .order-button:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .widget-meta {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      color: #666;
      font-size: 11px;
      font-weight: 800;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      min-height: 23px;
      padding: 0 8px;
      border-radius: 999px;
      background: #f4f4f2;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .mini-note {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(30px);
      opacity: 0;
      pointer-events: none;
      background: var(--ink);
      color: #fff;
      border-radius: var(--radius);
      padding: 10px 13px;
      font-weight: 750;
      transition: 180ms ease;
      max-width: min(480px, calc(100vw - 28px));
      text-align: center;
      z-index: 10;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .statusbar {
      display: none;
      justify-content: space-between;
      align-items: center;
      padding: 0 18px 28px;
      color: var(--ink);
      font-size: 16px;
      font-weight: 900;
    }

    .status-icons {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      font-size: 15px;
    }

    .app {
      max-width: 860px;
      padding-top: 28px;
    }

    .topbar {
      min-height: 112px;
      padding: 0 18px 18px;
      align-items: start;
    }

    .brand p {
      font-size: clamp(21px, 4.1vw, 34px);
      line-height: 1.08;
    }

    .date-line {
      margin-top: 8px;
      color: #6a6a6a;
      font-size: clamp(10px, 1.8vw, 14px);
      font-weight: 700;
    }

    .profile-button {
      width: 76px;
      height: 76px;
      font-size: 17px;
      outline: 9px solid rgba(255, 255, 255, 0.72);
      box-shadow: 0 18px 38px rgba(17, 17, 17, 0.12);
    }

    .toolbar {
      margin-bottom: 22px;
    }

    .toolbar h2,
    .sheet h2 {
      font-size: 34px;
      font-weight: 900;
    }

    .primary-button {
      height: 72px;
      padding: 0 26px;
      border-radius: 26px;
      background: #fff;
      color: var(--ink);
      border: 1px solid #efeee9;
      box-shadow: 0 16px 34px rgba(17, 17, 17, 0.08);
      font-size: 21px;
      font-weight: 850;
    }

    .workout-grid {
      gap: 26px;
    }

    .counter-card {
      min-height: 402px;
      padding: 24px 22px 22px;
      gap: 18px;
      border-radius: 30px;
      box-shadow: 0 24px 50px rgba(17, 17, 17, 0.08);
    }

    .counter-card::before {
      content: none;
    }

    .card-head {
      align-items: start;
      gap: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
    }

    .card-title {
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 16px;
      align-items: center;
    }

    .card-title h3 {
      font-size: clamp(22px, 3.3vw, 29px);
      line-height: 1.05;
    }

    .card-title p {
      margin-top: 8px;
      font-size: 20px;
    }

    .icon-bubble {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--bubble, #ffe7df);
      color: var(--card-accent, var(--accent));
    }

    .icon-bubble svg {
      width: 34px;
      height: 34px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon-button {
      display: none;
    }

    .count-row {
      align-items: center;
      padding-top: 0;
    }

    .count {
      color: var(--card-accent, var(--accent));
      font-size: clamp(29px, 5.2vw, 40px);
      text-shadow: none;
    }

    .count small {
      color: #666;
      font-size: 18px;
      font-weight: 700;
    }

    .target-pill {
      width: 72px;
      height: 72px;
      min-width: 72px;
      padding: 0;
      border-radius: 50%;
      background: conic-gradient(var(--card-accent, var(--accent)) var(--progress), #eee9e3 0);
      color: var(--ink);
      position: relative;
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 650;
    }

    .target-pill::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background: #fff;
    }

    .target-pill span {
      position: relative;
      z-index: 1;
    }

    .progress-track {
      display: none;
    }

    .sparkline-panel {
      min-height: 104px;
      align-content: center;
    }

    .sparkline {
      height: 88px;
    }

    .sparkline path.area {
      fill: color-mix(in srgb, var(--card-accent, var(--gold)) 12%, transparent);
    }

    .sparkline path.line {
      stroke: var(--card-accent, var(--gold));
      stroke-width: 4.5;
    }

    .sparkline circle {
      fill: var(--card-accent, var(--gold));
      stroke-width: 3.5;
    }

    .sparkline-days {
      display: flex;
      justify-content: space-between;
      margin-top: -8px;
      color: #777;
      font-size: 16px;
      font-weight: 700;
    }

    .sparkline-days span:last-child {
      width: 28px;
      height: 28px;
      margin-top: -6px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--bubble, #ffe7df);
      color: var(--card-accent, var(--accent));
    }

    .quick-row {
      gap: 16px;
    }

    .quick-row button {
      height: 56px;
      border-radius: 28px;
      background: #f4f4f2;
      color: var(--ink);
      font-size: 22px;
      font-weight: 900;
    }

    .quick-row button:nth-child(1),
    .quick-row button:nth-child(2) {
      background: #f4f4f2;
      color: var(--ink);
    }

    .quick-row button:nth-child(3) {
      background: var(--ink);
      color: #fff;
    }

    .card-tools {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 12px;
      margin-top: -4px;
    }

    .run-button {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .chip-button {
      height: 42px;
      border-radius: 22px;
      background: #f7f7f5;
      color: var(--ink);
      border: 1px solid #efeee9;
      font-size: 15px;
      font-weight: 850;
    }

    .run-dialog {
      width: min(520px, calc(100vw - 28px));
    }

    .run-modal {
      gap: 18px;
    }

    .run-display {
      min-height: 210px;
      border-radius: 28px;
      background: #f3f3f1;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      text-align: center;
      padding: 18px;
    }

    .run-metric {
      min-height: 174px;
      border-radius: 22px;
      background: #fff;
      display: grid;
      place-items: center;
      padding: 18px 10px;
    }

    .run-number {
      font-size: clamp(58px, 15vw, 92px);
      line-height: 0.9;
      font-weight: 900;
      letter-spacing: 0;
      color: var(--ink);
    }

    .run-label {
      margin-top: 12px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 850;
    }

    .run-progress {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--ink);
      font-size: 15px;
      font-weight: 850;
    }

    .run-progress span {
      color: var(--muted);
    }

    .run-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .log-card {
      min-height: 260px;
      padding: 24px 22px;
      border-radius: 30px;
      background: #fff;
      box-shadow: 0 24px 50px rgba(17, 17, 17, 0.08);
      display: grid;
      gap: 16px;
      align-content: space-between;
      border: 1px solid rgba(17, 17, 17, 0.04);
    }

    .log-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .log-title {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .log-icon {
      width: 56px;
      height: 56px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      background: var(--bubble, #e8f3ff);
      color: var(--card-accent, #2374ff);
      flex: 0 0 auto;
    }

    .log-icon svg {
      width: 30px;
      height: 30px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .log-title h3 {
      margin: 0;
      font-size: 24px;
      line-height: 1.08;
      font-weight: 900;
    }

    .log-title p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .log-record {
      height: 42px;
      padding: 0 16px;
      border-radius: 22px;
      background: var(--ink);
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      white-space: nowrap;
    }

    .log-value {
      display: flex;
      align-items: baseline;
      gap: 8px;
      color: var(--card-accent, var(--accent));
      font-size: clamp(42px, 8vw, 62px);
      line-height: 0.95;
      font-weight: 900;
    }

    .log-value small {
      color: #555;
      font-size: 20px;
      font-weight: 800;
    }

    .log-sub {
      color: var(--muted);
      font-size: 15px;
      font-weight: 800;
    }

    .log-line-panel {
      display: grid;
      gap: 4px;
    }

    .log-line-chart {
      height: 58px;
    }

    .log-line-dates {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      text-align: center;
    }

    .log-tools {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .log-quick-row {
      grid-column: 1 / -1;
      gap: 10px;
    }

    .log-quick-row button {
      height: 42px;
      font-size: 14px;
    }

    .record-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      min-height: 26px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .record-status.done {
      color: var(--good);
      background: rgba(112, 227, 160, 0.12);
    }

    .record-status.missing {
      color: #ff8f75;
      background: rgba(255, 143, 117, 0.12);
    }

    .nutrition-group-card {
      grid-column: 1 / -1;
      padding: 18px 20px;
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 42%),
        #191918;
      border: 1px solid rgba(255, 255, 255, 0.09);
      box-shadow: var(--shadow-soft);
      display: grid;
      gap: 4px;
    }

    .nutrition-group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 10px;
    }

    .section-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .section-actions .text-btn {
      height: 34px;
      padding: 0 12px;
      border-radius: 17px;
      background: #242421;
      color: var(--ink);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 12px;
      font-weight: 900;
    }

    .nutrition-group-head h3 {
      margin: 0;
      font-size: 21px;
      font-weight: 900;
    }

    .nutrition-group-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .nutrition-group-list {
      display: grid;
    }

    .nutrition-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(160px, 0.8fr) auto;
      gap: 14px;
      align-items: center;
      padding: 14px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.07);
    }

    .nutrition-row-main {
      min-width: 0;
    }

    .nutrition-name-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .nutrition-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--card-accent, var(--accent));
      flex: 0 0 auto;
    }

    .nutrition-name {
      font-size: 16px;
      font-weight: 900;
    }

    .nutrition-values {
      display: flex;
      align-items: baseline;
      gap: 5px;
      flex-wrap: wrap;
    }

    .nutrition-num {
      color: var(--card-accent, var(--accent));
      font-size: 22px;
      font-weight: 900;
      line-height: 1;
    }

    .nutrition-goal {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .nutrition-progress {
      height: 5px;
      margin-top: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    .nutrition-progress span {
      display: block;
      height: 100%;
      width: var(--fill);
      border-radius: inherit;
      background: var(--card-accent, var(--accent));
    }

    .nutrition-percent {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--card-accent, var(--accent)) var(--progress), rgba(255, 255, 255, 0.12) 0);
      position: relative;
      color: var(--ink);
      font-size: 11px;
      font-weight: 650;
    }

    .nutrition-percent::before {
      content: "";
      position: absolute;
      inset: 7px;
      border-radius: 50%;
      background: #191918;
    }

    .nutrition-percent span {
      position: relative;
      z-index: 1;
    }

    .nutrition-row .log-line-panel {
      padding: 0;
      background: transparent;
      border: 0;
    }

    .nutrition-row .log-line-chart {
      height: 42px;
    }

    .nutrition-row .mini-line .area {
      display: none;
    }

    .nutrition-row .mini-line .line {
      stroke-width: 2.8;
    }

    .nutrition-row .mini-line .dot {
      r: 3;
    }

    .nutrition-row .log-line-dates {
      display: none;
    }

    .nutrition-row .log-record {
      width: 52px;
      height: 38px;
      padding: 0;
      border-radius: 19px;
    }

    /* Fitnessku-inspired dark fitness theme */
    :root {
      color-scheme: dark;
      --bg: #10100f;
      --panel: #191918;
      --panel-soft: #252522;
      --ink: #f7f4ed;
      --muted: #aaa59b;
      --line: rgba(255, 255, 255, 0.1);
      --accent: #ff9867;
      --accent-2: #70e3a0;
      --accent-3: #353532;
      --accent-4: #87a7ff;
      --gold: #ffb260;
      --good: #70e3a0;
      --shadow: 0 28px 70px rgba(0, 0, 0, 0.42);
      --shadow-soft: 0 18px 42px rgba(0, 0, 0, 0.28);
    }

    body {
      background: #10100f;
      color: var(--ink);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.75), transparent 62%);
      pointer-events: none;
      z-index: -1;
    }

    .statusbar,
    .brand p,
    .toolbar h2,
    .sheet h2 {
      color: var(--ink);
    }

    .brand {
      display: contents;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
    }

    .brand p,
    .date-line {
      grid-column: 1;
    }

    .profile-button {
      grid-column: 2;
      grid-row: 1 / span 2;
      justify-self: end;
    }

    .score-line,
    .score-note {
      grid-column: 1 / -1;
      width: 100%;
    }

    .date-line,
    .score-note,
    .stats-top p,
    .card-title p,
    .log-title p,
    .exercise-stat-title p,
    .run-label,
    .run-progress span {
      color: var(--muted);
    }

    .score-line {
      background: #1c1c1a;
      color: var(--ink);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-bottom-color: transparent;
      box-shadow: var(--shadow-soft);
      width: min(100%, 560px);
      min-height: 48px;
      justify-content: space-between;
      padding: 0 18px;

<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <h1 data-i18n="appTitle">Daily Rep Counter</h1>
        <p id="subtitle"></p>
        <section class="score-card" aria-label="Today score">
          <div class="score-card-top">
            <div class="date-line" id="todayLine"></div>
            <div class="score-label">Score</div>
          </div>
          <div class="score-line" id="todayScoreLine"></div>
          <div class="score-chart" id="todayCalorieChart"></div>
        </section>
      </div>
      <button class="profile-button" id="profileButton" type="button" title="Profile">ME</button>
    </header>

    <nav class="page-nav" aria-label="App pages">
      <button class="nav-button active" type="button" data-page-target="today" data-i18n="todayPage">Today</button>
      <button class="nav-button" type="button" data-page-target="stats" data-i18n="statsPage">Stats</button>
      <button class="nav-button" type="button" data-page-target="me" data-i18n="myPage">My page</button>
    </nav>

    <section class="page active" id="page-today">
      <section class="surface" aria-labelledby="todayTitle">
        <div class="toolbar">
          <h2 id="todayTitle" data-i18n="todayTraining">Today</h2>
          <div class="toolbar-actions">
            <button class="primary-button" id="addWorkoutButton" type="button" data-i18n="addWorkout">Widget +</button>
          </div>
        </div>
        <div class="workout-grid" id="workoutGrid"></div>
      </section>
    </section>

    <section class="page" id="page-stats">
      <aside class="sheet" aria-labelledby="statsTitle">
        <h2 id="statsTitle" data-i18n="stats">Stats</h2>
        <div class="stats-top">
          <div>
            <p id="statsRangeLabel"></p>
          </div>
          <div class="period-toggle" aria-label="Stats period">
            <button class="active" type="button" data-stats-mode="recent7" data-i18n="recent7Mode">7 days</button>
            <button type="button" data-stats-mode="recent30" data-i18n="recent30Mode">30 days</button>
            <button type="button" data-stats-mode="calendarMonth" data-i18n="monthlyMode">Monthly</button>
          </div>
        </div>
        <div class="month-switcher" id="monthSwitcher">
          <button type="button" id="prevStatsMonth" aria-label="Previous month">‹</button>
          <strong id="statsMonthLabel"></strong>
          <button type="button" id="nextStatsMonth" aria-label="Next month">›</button>
        </div>
        <div class="stats-workout-list" id="statsWorkoutList"></div>
      </aside>
    </section>

    <section class="page" id="page-me">
      <section class="surface profile-surface" aria-labelledby="profileTitle">
        <form class="modal" id="profileForm">
          <h2 id="profileTitle" data-i18n="profile">My page</h2>
          <div class="field">
            <label for="nickname" data-i18n="nickname">Nickname</label>
            <input class="text-input" id="nickname" maxlength="24" autocomplete="nickname">
          </div>
          <div class="field">
            <label for="language" data-i18n="language">Language</label>
            <select class="select-input" id="language">
              <option value="en">English</option>
              <option value="zh">中文</option>
              <option value="ko">한국어</option>
            </select>
          </div>
          <div class="field-grid">
            <div class="field">
              <label for="age">나이</label>
              <input class="number-input" id="age" type="number" min="1" max="120" step="1" placeholder="36">
            </div>
            <div class="field">
              <label for="sex">성별</label>
              <select class="select-input" id="sex">
                <option value="">선택</option>
                <option value="female">여성</option>
                <option value="male">남성</option>
                <option value="other">기타</option>
              </select>
            </div>
            <div class="field">
              <label for="heightCm">키 cm</label>
              <input class="number-input" id="heightCm" type="number" min="80" max="240" step="1" placeholder="175">
            </div>
            <div class="field">
              <label for="weightKg">체중 kg</label>
              <input class="number-input" id="weightKg" type="number" min="20" max="250" step="0.1" placeholder="70">
            </div>
          </div>
          <p class="mini-note" data-i18n="profileHint">Your data is saved in this browser.</p>
          <div class="modal-actions">
            <button class="primary-button" type="submit" data-i18n="save">Save</button>
          </div>
        </form>
      </section>
    </section>
  </main>

  <dialog id="workoutDialog">
    <form class="modal" method="dialog" id="workoutForm">
      <h2 id="workoutDialogTitle" data-i18n="addWorkout">Add item</h2>
      <input type="hidden" id="editingWorkoutId">
      <div class="field">
        <label for="widgetKind">위젯 종류</label>
        <select class="select-input" id="widgetKind">
          <option value="exercise">개별 운동</option>
          <option value="combo">조합 운동</option>
        </select>
      </div>
      <div class="field">
        <label for="workoutName" data-i18n="itemName">Item name</label>
        <input class="text-input" id="workoutName" maxlength="28" required>
      </div>
      <div class="field">
        <label for="workoutTarget" data-i18n="dailyTarget">Daily target</label>
        <input class="number-input" id="workoutTarget" type="number" min="0" step="1" value="50">
      </div>
      <div class="field exercise-settings">
        <label for="workoutMet">기본 칼로리 기준</label>
        <input class="number-input" id="workoutMet" type="number" min="1" max="15" step="0.1" value="5">
      </div>
      <div class="field exercise-settings">
        <label for="secondsPerRep">기본 템포 초</label>
        <input class="number-input" id="secondsPerRep" type="number" min="1" max="600" step="1" value="3">
      </div>
      <div class="field" id="comboField">
        <label>조합할 운동</label>
        <div class="check-list" id="comboList"></div>
      </div>
      <section class="widget-manager" id="widgetManager">
        <h3>현재 위젯</h3>
        <div class="widget-order-list" id="widgetOrderList"></div>
      </section>
      <div class="modal-actions">
        <button class="danger-button" type="button" id="deleteWorkoutButton" data-i18n="delete">Delete</button>
        <button class="quiet-button" type="button" id="closeWorkout" data-i18n="cancel">Cancel</button>
        <button class="primary-button" type="submit" data-i18n="save">Save</button>
      </div>
    </form>
  </dialog>

  <dialog id="nutritionManageDialog">
    <form class="modal" method="dialog" id="nutritionManageForm">
      <h2>영양소 항목 관리</h2>
      <div class="manage-list" id="nutritionManageList"></div>
      <section class="add-section">
        <h3>새 항목 추가</h3>
        <div class="field-grid">
          <div class="field">
            <label for="newNutritionName">항목명</label>
            <input class="text-input" id="newNutritionName" maxlength="18" placeholder="비타민C">
          </div>
          <div class="field">
            <label for="newNutritionUnit">단위</label>
            <input class="text-input" id="newNutritionUnit" maxlength="8" placeholder="mg">
          </div>
        </div>
        <button class="quiet-button" type="button" id="addNutritionType">추가</button>
      </section>
      <div class="modal-actions">
        <button class="primary-button" type="button" id="closeNutritionManage">완료</button>
      </div>
    </form>
  </dialog>

  <dialog id="nutritionImportDialog">
    <form class="modal" method="dialog" id="nutritionImportForm">
      <h2>영양소 가져오기</h2>
      <div class="field">
        <label for="nutritionImportText">복사한 영양소 텍스트</label>
        <textarea class="text-input textarea-input" id="nutritionImportText" placeholder="칼로리: 350&#10;탄수화물: 45&#10;지방: 12&#10;나트륨: 380"></textarea>
      </div>
      <p class="mini-note" id="nutritionImportResult"></p>
      <div class="modal-actions">
        <button class="quiet-button" type="button" id="closeNutritionImport">취소</button>
        <button class="primary-button" type="submit">가져오기</button>
      </div>
    </form>
  </dialog>

  <dialog id="weightManageDialog">
    <form class="modal" method="dialog" id="weightManageForm">
      <h2>체중 관리</h2>
      <div class="field">
        <label for="weightGoalInput">목표 체중 kg</label>
        <input class="number-input" id="weightGoalInput" type="number" min="20" max="300" step="0.1" placeholder="70.0">
      </div>

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!saved) return structuredClone(defaultState);
        let workouts = Array.isArray(saved.workouts) ? saved.workouts : defaultState.workouts;
        const removedWorkoutIds = [];
        workouts.forEach((workout) => {
          if (workout.id === "protein" || /^(단백질|protein|단백질 섭취|protein intake)$/i.test(workout.name || "")) {
            workout.kind = "nutrition";
            workout.name = workout.name || "단백질";
            workout.target = Number(workout.target || 120);
            workout.unit = "g";
          }
        });
        const seenNutritionNames = new Set();
        workouts = workouts.filter((workout) => {
          if (workout.kind !== "nutrition") return true;
          const key = String(workout.name || workout.id || "").trim().toLowerCase();
          if (!key || !seenNutritionNames.has(key)) {
            if (key) seenNutritionNames.add(key);
            return true;
          }
          removedWorkoutIds.push(workout.id);
          return false;
        });
        Object.keys(saved.records || {}).forEach((dateKey) => {
          removedWorkoutIds.forEach((workoutId) => delete saved.records[dateKey][workoutId]);
          if (Object.keys(saved.records[dateKey]).length === 0) delete saved.records[dateKey];
        });
        saved.lastActions = Array.isArray(saved.lastActions)
          ? saved.lastActions.filter((item) => !removedWorkoutIds.includes(item.workoutId))
          : [];
        defaultState.workouts.forEach((defaultWorkout) => {
          if (!workouts.some((workout) => workout.id === defaultWorkout.id)) {
            workouts.push(structuredClone(defaultWorkout));
          }
        });
        const hasCustomCalories = workouts.some((workout) => {
          return workout.kind === "nutrition"
            && workout.id !== "nutrition-calories"
            && (workout.unit === "kcal" || /칼로리|열량|calorie/i.test(workout.name || ""));
        });
        if (hasCustomCalories) {
          const hasDefaultCalorieRecords = Object.values(saved.records || {}).some((record) => {
            return Number(record?.["nutrition-calories"] || 0) > 0;
          });
          if (!hasDefaultCalorieRecords) {
            const defaultCalorieIndex = workouts.findIndex((workout) => workout.id === "nutrition-calories");
            if (defaultCalorieIndex !== -1) workouts.splice(defaultCalorieIndex, 1);
          }
        }
        workouts.forEach((workout) => {
          const defaults = defaultState.workouts.find((item) => item.id === workout.id);
          workout.kind ||= defaults?.kind || "exercise";
          workout.met = Number(workout.met || defaults?.met || 4);
          workout.secondsPerRep = Number(workout.secondsPerRep || defaults?.secondsPerRep || 3);
          workout.unit ||= defaults?.unit || "";
          if (workout.kind === "water") {
            workout.mode = "count";
            workout.cupMl = Number(workout.cupMl || defaults?.cupMl || 250);
            workout.unit = "회";
            if (!workout.target || Number(workout.target) > 100) workout.target = defaults?.target || 8;
          }
          if (workout.kind === "nutrition") {
            const nutritionLabel = workout.name || defaults?.name || i18n.ko[workout.nameKey] || "";
            const inferredUnit = inferNutritionUnit(nutritionLabel);
            if (!workout.unit || shouldReplaceNutritionUnit(workout.unit, inferredUnit, nutritionLabel)) {
              workout.unit = inferredUnit;
            }
          }
          if (workout.kind === "combo") workout.components ||= defaults?.components || [];
        });
        return {
          ...structuredClone(defaultState),
          ...saved,
          profile: { ...defaultState.profile, ...saved.profile },
          workouts,
          records: saved.records || {},
          lastActions: Array.isArray(saved.lastActions) ? saved.lastActions : []
        };
      } catch {
        return structuredClone(defaultState);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function t(key, params = {}) {
      const lang = state.profile.language || "ko";
      const template = (i18n[lang] && i18n[lang][key]) || i18n.en[key] || key;
      return Object.entries(params).reduce((text, [name, value]) => {
        return text.replaceAll(`{${name}}`, value);
      }, template);
    }

    function todayKey() {
      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: "Asia/Bangkok",
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).formatToParts(new Date());
      const values = Object.fromEntries(parts.map((part) => [part.type, part.value]));
      return `${values.year}-${values.month}-${values.day}`;
    }

    function addDays(dateKey, amount) {
      const [year, month, day] = dateKey.split("-").map(Number);
      const date = new Date(Date.UTC(year, month - 1, day));
      date.setUTCDate(date.getUTCDate() + amount);
      return date.toISOString().slice(0, 10);
    }

    function addMonths(monthKey, amount) {
      const [year, month] = monthKey.split("-").map(Number);
      const date = new Date(Date.UTC(year, month - 1 + amount, 1));
      return date.toISOString().slice(0, 7);
    }

    function daysInMonth(monthKey) {
      const [year, month] = monthKey.split("-").map(Number);
      return new Date(Date.UTC(year, month, 0)).getUTCDate();
    }

    function formatMonthLabel(monthKey) {
      const [year, month] = monthKey.split("-").map(Number);
      if ((state.profile.language || "ko") === "en") {
        return new Intl.DateTimeFormat("en-US", { month: "long", year: "numeric" }).format(new Date(Date.UTC(year, month - 1, 1)));
      }
      return `${year}년 ${month}월`;
    }

    function formatThaiDate(dateKey) {
      const [year, month, day] = dateKey.split("-").map(Number);
      const date = new Date(Date.UTC(year, month - 1, day, 12));
      const weekday = new Intl.DateTimeFormat("ko-KR", {
        timeZone: "Asia/Bangkok",
        weekday: "short"
      }).format(date);
      return `${year}년${month}월${day}일(${weekday})`;
    }

    function getCount(dateKey, workoutId) {
      return Number(state.records[dateKey]?.[workoutId] || 0);
    }

    function setCount(dateKey, workoutId, value, options = {}) {
      const nextValue = Math.max(0, Number(value) || 0);
      state.records[dateKey] ||= {};
      if (nextValue === 0) {
        delete state.records[dateKey][workoutId];
      } else {
        state.records[dateKey][workoutId] = nextValue;
      }
      if (Object.keys(state.records[dateKey]).length === 0) {
        delete state.records[dateKey];
      }
      saveState();
      if (options.silent) return;
      render();
      if (options.bump) bumpWorkout(options.bump);
    }

    function workoutName(workout) {
      return workout.nameKey ? t(workout.nameKey) : workout.name;
    }

    function getWorkout(workoutId) {
      return state.workouts.find((workout) => workout.id === workoutId);
    }

    function baseExercises() {
      return state.workouts.filter((workout) => !workout.kind || workout.kind === "exercise");
    }

    function weightKg() {
      return Number(state.profile.weightKg) || 70;
    }

    function kcalForWorkout(workout, count) {
      if (workout.kind === "combo") {
        return (workout.components || []).reduce((sum, componentId) => {
          const component = getWorkout(componentId);
          return sum + (component ? kcalForWorkout(component, count) : 0);
        }, 0);
      }
      if (workout.kind && workout.kind !== "exercise") return 0;
      const minutes = (Number(workout.secondsPerRep) || 3) * count / 60;
      return 0.0175 * (Number(workout.met) || 4) * weightKg() * minutes;
    }

    function exerciseKcalForDate(dateKey) {
      return state.workouts.reduce((sum, workout) => {
        const count = getCount(dateKey, workout.id);
        if (!count) return sum;
        if (!workout.kind || workout.kind === "exercise") {
          return sum + kcalForWorkout(workout, count);
        }
        if (workout.kind === "combo") {
          const hasLinkedCounts = (workout.components || []).some((componentId) => getCount(dateKey, componentId) > 0);
          return hasLinkedCounts ? sum : sum + kcalForWorkout(workout, count);
        }
        return sum;
      }, 0);
    }

    function todayCalories() {
      return Math.round(exerciseKcalForDate(todayKey()));
    }

    function difficultyPoint(workout) {
      const met = Number(workout.met || 4);
      if (met >= 8) return 2;
      if (met >= 5) return 1.5;
      if (met >= 3) return 1;
      return 0.5;
    }

    function workoutPointForCount(workout, count) {
      if (!count) return 0;
      if (workout.kind === "combo") {
        const components = (workout.components || []).map((id) => getWorkout(id)).filter(Boolean);
        const average = components.length
          ? components.reduce((sum, item) => sum + difficultyPoint(item), 0) / components.length
          : 1;
        return count * average;
      }
      if (!workout.kind || workout.kind === "exercise") return count * difficultyPoint(workout);
      return 0;
    }

    function scoreForDate(dateKey) {
      return Math.round(state.workouts.reduce((sum, workout) => {
        const count = getCount(dateKey, workout.id);
        if (!count) return sum;
        if (workout.kind === "body") return sum + 5;
        if (workout.kind === "water") return sum + count;
        if (workout.kind === "nutrition") return sum + 3;
        return sum + workoutPointForCount(workout, count);
      }, 0));
    }

    function displayKind(workout) {
      if (workout.kind === "combo") return "조합 운동";
      if (workout.kind === "nutrition") return "영양소 섭취 기록";
      if (workout.kind === "body") return "체중 기록";
      if (workout.kind === "water") return "수분 섭취 횟수";
      return "개별 운동";
    }

    function scoreRuleLabel(workout) {
      if (workout.kind === "body") return "기록 1회 완료 시 5점";
      if (workout.kind === "water") return "기록 1회 완료 시 1점";
      if (workout.kind === "nutrition") return "항목별 기록 1회 완료 시 3점";
      if (workout.kind === "combo") return "횟수와 난이도 기준 점수";
      return "횟수와 난이도 기준 점수";
    }

    function linkedNames(workout) {
      if (workout.kind !== "combo") return "";
      return (workout.components || []).map((id) => {
        const component = getWorkout(id);
        return component ? workoutName(component) : "";
      }).filter(Boolean).join(" + ");
    }

    function unitForWorkout(workout) {
      if (workout.unit) return workout.unit;
      if (workout.kind === "nutrition") return inferNutritionUnit(workoutName(workout));
      if (workout.kind === "body") return "kg";
      if (workout.kind === "water") return "회";
      return "회";
    }

    function inferNutritionUnit(name = "") {
      const label = String(name).toLowerCase();
      if (/칼로리|열량|kcal|calorie|energy/.test(label)) return "kcal";
      if (/나트륨|소듐|sodium|콜레스테롤|cholesterol|칼슘|calcium|철분|iron|마그네슘|magnesium|아연|zinc|비타민|vitamin|오메가|omega/.test(label)) return "mg";
      if (label === "물" || /수분|water/.test(label)) return "ml";
      return "g";
    }

    function shouldReplaceNutritionUnit(unit, inferredUnit, name = "") {
      if (!unit || unit === inferredUnit) return !unit;
      const label = String(name).toLowerCase();
      const isEnergy = /칼로리|열량|kcal|calorie|energy/.test(label);
      const isMicro = /나트륨|소듐|sodium|콜레스테롤|cholesterol|칼슘|calcium|철분|iron|마그네슘|magnesium|아연|zinc|비타민|vitamin|오메가|omega/.test(label);
      const isWater = label === "물" || /수분|water/.test(label);
      if (unit === "ml" && /탄수화물|carb/.test(label)) return true;
      return unit === "g" && (isEnergy || isMicro || isWater);
    }

    function formatMetric(value, workout) {
      if (!value) return "—";
      if (workout.kind === "body") return Number(value).toFixed(1).replace(/\.0$/, "");
      return Number(value).toLocaleString();
    }

    function displayUnit(workout, value = 0) {
      return unitForWorkout(workout);
    }

    function totalForDate(dateKey) {
      return Object.values(state.records[dateKey] || {}).reduce((sum, value) => sum + Number(value || 0), 0);

    function weeklyWorkoutValues(endDate, workoutId) {
      return Array.from({ length: 7 }, (_, index) => {
        const dateKey = addDays(endDate, index - 6);
        return {
          dateKey,
          label: dateKey.slice(8),
          value: getCount(dateKey, workoutId)
        };
      });
    }

    function buildSparkline(values) {
      const width = 230;
      const height = 58;
      const pad = 8;
      const max = Math.max(1, ...values.map((item) => item.value));
      const points = values.map((item, index) => {
        const x = pad + (index / Math.max(1, values.length - 1)) * (width - pad * 2);
        const y = height - pad - (item.value / max) * (height - pad * 2);
        return { x, y };
      });
      const line = points.reduce((path, point, index) => {
        if (index === 0) return `M ${point.x.toFixed(1)} ${point.y.toFixed(1)}`;
        const prev = points[index - 1];
        const midX = (prev.x + point.x) / 2;
        return `${path} C ${midX.toFixed(1)} ${prev.y.toFixed(1)}, ${midX.toFixed(1)} ${point.y.toFixed(1)}, ${point.x.toFixed(1)} ${point.y.toFixed(1)}`;
      }, "");
      const area = `${line} L ${points[points.length - 1].x.toFixed(1)} ${height - pad} L ${points[0].x.toFixed(1)} ${height - pad} Z`;
      const last = points[points.length - 1];
      const dayLabels = ["M", "T", "W", "T", "F", "S", "S"];
      const labels = values.map((item, index) => `<span>${dayLabels[index]}</span>`).join("");
      return `
        <div>
          <svg class="sparkline" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" aria-hidden="true">
            <path class="area" d="${area}"></path>
            <path class="line" d="${line}"></path>
            <circle cx="${last.x.toFixed(1)}" cy="${last.y.toFixed(1)}" r="5"></circle>
          </svg>
          <div class="sparkline-days">${labels}</div>
        </div>
      `;
    }

    function buildMiniLine(values, options = {}) {
      const width = options.width || 230;
      const height = options.height || 58;
      const pad = options.pad || 8;
      const max = Math.max(1, ...values.map((item) => Number(item.value) || 0));
      const min = options.allowRange ? Math.min(...values.map((item) => Number(item.value) || 0).filter((value) => value > 0), max) : 0;
      const range = Math.max(1, max - min);
      const points = values.map((item, index) => {
        const value = Number(item.value) || 0;
        const x = pad + (index / Math.max(1, values.length - 1)) * (width - pad * 2);
        const scaled = options.allowRange && value > 0 ? (value - min) / range : value / max;
        const y = height - pad - scaled * (height - pad * 2);
        return { x, y };
      });
      const line = points.reduce((path, point, index) => {
        if (index === 0) return `M ${point.x.toFixed(1)} ${point.y.toFixed(1)}`;
        const prev = points[index - 1];
        const midX = (prev.x + point.x) / 2;
        return `${path} C ${midX.toFixed(1)} ${prev.y.toFixed(1)}, ${midX.toFixed(1)} ${point.y.toFixed(1)}, ${point.x.toFixed(1)} ${point.y.toFixed(1)}`;
      }, "");
      const area = `${line} L ${points[points.length - 1].x.toFixed(1)} ${height - pad} L ${points[0].x.toFixed(1)} ${height - pad} Z`;
      const last = points[points.length - 1];
      const preserveAspectRatio = options.preserveAspectRatio || "none";
      return `
        <svg class="mini-line ${options.className || ""}" viewBox="0 0 ${width} ${height}" preserveAspectRatio="${preserveAspectRatio}" aria-hidden="true">
          <path class="area" d="${area}"></path>
          <path class="line" d="${line}"></path>
          <circle class="dot" cx="${last.x.toFixed(1)}" cy="${last.y.toFixed(1)}" r="4"></circle>
        </svg>
      `;
    }

    function buildLogLinePanel(values, workout) {
      const labels = values.map((item) => `<span>${item.dateKey.slice(5).replace("-", "/")}</span>`).join("");
      const miniOptions = workout.kind === "nutrition"
        ? { allowRange: false, className: "log-mini-line", width: 160, height: 40, preserveAspectRatio: "xMinYMid meet" }
        : { allowRange: workout.kind === "body", className: "log-mini-line" };
      return `
        <div class="log-line-panel">
          <div class="log-line-chart">${buildMiniLine(values, miniOptions)}</div>
          <div class="log-line-dates">${labels}</div>
        </div>
      `;
    }

    function totalForRange(endDate, days) {
      let total = 0;
      for (let i = 0; i < days; i += 1) {
        total += totalForDate(addDays(endDate, -i));
      }
      return total;
    }

    function allTimeTotal() {
      return Object.keys(state.records).reduce((sum, dateKey) => sum + totalForDate(dateKey), 0);
    }

    function streak() {
      let count = 0;
      let cursor = todayKey();
      while (totalForDate(cursor) > 0) {
        count += 1;
        cursor = addDays(cursor, -1);
      }
      return count;
    }

    function handleCounterAction(workout, action, value) {
      if (!workout) return;
      const dateKey = todayKey();
      if (action === "inc") {
        const amount = Number(value);
        const before = getCount(dateKey, workout.id);
        const linked = workout.kind === "combo" ? [...(workout.components || [])] : [];
        linked.forEach((componentId) => {
          setCount(dateKey, componentId, getCount(dateKey, componentId) + amount, { silent: true });
        });
        state.lastActions.push({ dateKey, workoutId: workout.id, amount, linked });
        state.lastActions = state.lastActions.slice(-20);
        setCount(dateKey, workout.id, before + amount, { bump: workout.id });
      }
      if (action === "set") {
        els.countWorkoutId.value = workout.id;
        els.countDialogTitle.textContent = workoutName(workout);
        els.countValue.value = getCount(dateKey, workout.id);
        els.countValue.step = workout.kind === "body" || (workout.kind === "water" && workout.unit === "L") ? "0.1" : "1";
        els.countValue.placeholder = unitForWorkout(workout);
        els.countAddField.style.display = workout.kind === "nutrition" || workout.kind === "water" ? "grid" : "none";
        els.countAddValue.value = "";
        els.countAddValue.step = workout.kind === "nutrition" || (workout.kind === "water" && workout.unit === "L") ? "0.1" : "1";
        els.countAddValue.placeholder = unitForWorkout(workout);
        els.countDialog.showModal();
        setTimeout(() => els.countValue.select(), 50);
      }
      if (action === "undo") {
        const index = [...state.lastActions].reverse().findIndex((item) => {
          return item.dateKey === dateKey && item.workoutId === workout.id;
        });
        if (index === -1) {
          showToast(t("nothingUndo"));
          return;
        }
        const realIndex = state.lastActions.length - 1 - index;
        const actionItem = state.lastActions.splice(realIndex, 1)[0];
        (actionItem.linked || []).forEach((componentId) => {
          setCount(dateKey, componentId, getCount(dateKey, componentId) - actionItem.amount, { silent: true });
        });
        setCount(dateKey, workout.id, getCount(dateKey, workout.id) - actionItem.amount, { bump: workout.id });
        showToast(t("undoDone"));
      }
      if (action === "edit") {
        openWorkoutDialog(workout);
      }
      if (action === "run") {
        openRunDialog(workout);
      }
    }

        const empty = document.createElement("div");

      statWorkouts.forEach((workout, index) => {

    function statsDays() {
      if (statsMode === "calendarMonth") {
        const length = daysInMonth(statsMonthKey);
        return Array.from({ length }, (_, index) => `${statsMonthKey}-${String(index + 1).padStart(2, "0")}`);
      }
      const length = statsMode === "recent7" ? 7 : 30;
      return Array.from({ length }, (_, index) => addDays(todayKey(), index - length + 1));
    }

    function buildStatBars(values) {
      const max = Math.max(1, ...values.map((item) => item.value));
      const axis = values.map((item, index) => {
        if (statsMode !== "recent7" && index % 5 !== 0 && index !== values.length - 1) return "<span></span>";
        return `<span>${item.dateKey.slice(5).replace("-", "/")}</span>`;
      }).join("");
      return `
        <div class="stat-bars">
          <div class="stat-guide"></div>
          <div class="stat-tooltip"></div>
          ${values.map((item, index) => `<div class="stat-bar${item.dateKey === todayKey() ? " today" : ""}" data-index="${index}" data-date="${item.dateKey}" data-value="${item.value}" style="height:${Math.max(5, (item.value / max) * 100)}%" title="${item.dateKey}: ${item.value}"></div>`).join("")}
        </div>
        <div class="stat-axis">${axis}</div>
      `;
    }

    function bindStatInteractions() {
      document.querySelectorAll(".stat-bars").forEach((chart) => {
        const bars = [...chart.querySelectorAll(".stat-bar")];
        const guide = chart.querySelector(".stat-guide");
        const tooltip = chart.querySelector(".stat-tooltip");
        const selectBar = (bar) => {
          if (!bar) return;
          bars.forEach((item) => item.classList.toggle("is-selected", item === bar));
          const chartRect = chart.getBoundingClientRect();
          const barRect = bar.getBoundingClientRect();
          const x = barRect.left + barRect.width / 2 - chartRect.left;
          guide.style.left = `${x}px`;
          tooltip.style.left = `${Math.max(58, Math.min(chartRect.width - 58, x))}px`;
          tooltip.innerHTML = `${bar.dataset.date}<span>${Number(bar.dataset.value).toLocaleString()}점</span>`;
          chart.classList.add("active");
        };
        bars.forEach((bar) => {
          bar.addEventListener("pointerenter", () => selectBar(bar));
          bar.addEventListener("focus", () => selectBar(bar));
        });
        chart.addEventListener("pointermove", (event) => {
          const chartRect = chart.getBoundingClientRect();
          const ratio = Math.max(0, Math.min(1, (event.clientX - chartRect.left) / Math.max(1, chartRect.width)));
          const index = Math.round(ratio * (bars.length - 1));
          selectBar(bars[index]);
        });
        chart.addEventListener("pointerleave", () => {
          chart.classList.remove("active");
          bars.forEach((bar) => bar.classList.remove("is-selected"));
        });
      });
    }

    function handleWidgetOrderAction(workoutId, action) {
      const index = state.workouts.findIndex((workout) => workout.id === workoutId);
      if (index === -1) return;
      const workout = state.workouts[index];
      if (workout.kind && workout.kind !== "exercise" && workout.kind !== "combo") return;
      if (action === "edit") {
        openWorkoutDialog(workout);
        return;
      }
      const direction = action === "up" ? -1 : 1;
      let targetIndex = index + direction;
      while (targetIndex >= 0 && targetIndex < state.workouts.length) {
        const target = state.workouts[targetIndex];
        if (!target.kind || target.kind === "exercise" || target.kind === "combo") break;
        targetIndex += direction;
      }
      if (targetIndex < 0 || targetIndex >= state.workouts.length) return;
      const [item] = state.workouts.splice(index, 1);
      state.workouts.splice(targetIndex, 0, item);
      saveState();
      render();
      renderWidgetOrderList();
      showToast("위젯 순서를 바꿨습니다.");
    }

    function importNutritionText(text) {
      const lines = text.split("\n");
      const matched = [];
      lines.forEach((line) => {
        const match = line.match(/^(.+?)[\s:：]+([0-9]+\.?[0-9]*)/);
        if (!match) return;
        const rawName = match[1].trim();
        const value = Number(match[2]);
        if (!Number.isFinite(value) || value < 0) return;
        const workout = state.workouts.find((item) => {
          if (item.kind !== "nutrition") return false;
          const name = workoutName(item);
          return name === rawName || name.includes(rawName) || rawName.includes(name);
        });
        if (!workout) return;
        setCount(todayKey(), workout.id, value, { silent: true });
        matched.push(`${workoutName(workout)} ${value}${unitForWorkout(workout)}`);
      });
      saveState();
      render();
      return matched;
    }

    function updateRunDisplay(label, number = runSession.tick) {
